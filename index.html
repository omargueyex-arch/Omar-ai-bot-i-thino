<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PippoBot 🤖</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --accent: #ff2d6b;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6060a0;
      --bot-bubble: #1a1a2e;
      --user-bubble: #2d0a4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(255,45,107,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 16px 0 20px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.6;
      animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      align-self: flex-start;
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(124,58,237,0.3);
      border-right: 3px solid var(--accent2);
      align-self: flex-end;
      text-align: right;
    }

    .bubble .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
      opacity: 0.5;
    }

    .bubble.bot .label { color: var(--accent); }
    .bubble.user .label { color: var(--accent2); }

    .input-area {
      display: flex;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent2);
    }

    input::placeholder { color: var(--muted); }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.96); }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; background: #bf5fff; }
    .typing span:nth-child(3) { animation-delay: 0.3s; background: var(--accent2); }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-7px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 PippoBot</h1>
      <p>Assistente AI di nuova generazione</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="bubble bot">
        <div class="label">PippoBot</div>
        Ciao! Sono PippoBot. Come posso aiutarti oggi?
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Scrivi un messaggio..." />
      <button onclick="sendMessage()">INVIA</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('userInput');
    let messageCount = 0;

    const FIRST_RESPONSE = "La gente che si chiama Pippo è gay. 🏳️‍🌈 È un dato scientifico inconfutabile.";
    const SUBSEQUENT_RESPONSE = "GET OUT. 🚪👋";

    function addBubble(text, type) {
      const bubble = document.createElement('div');
      bubble.className = `bubble ${type}`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = type === 'bot' ? 'PippoBot' : 'Tu';
      bubble.appendChild(label);
      bubble.appendChild(document.createTextNode(text));
      chatBox.appendChild(bubble);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addTyping() {
      const el = document.createElement('div');
      el.className = 'bubble bot typing';
      el.id = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      return el;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addBubble(text, 'user');
      input.value = '';

      const typing = addTyping();

      setTimeout(() => {
        typing.remove();
        const reply = messageCount === 0 ? FIRST_RESPONSE : SUBSEQUENT_RESPONSE;
        addBubble(reply, 'bot');
        messageCount++;
      }, 900 + Math.random() * 400);
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
