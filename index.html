<!doctype html>

<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chatbot SUPER ULTRA 🎉</title>
<style>
:root{--accent:#ffd700;--bg:#071025;--card:#111827;--muted:#9fb0bf;--primary:#06b6d4;--secondary:#0ea5a5}
body{margin:0;font-family:Arial, sans-serif;background:linear-gradient(135deg,#04101a,#071025);color:white}
.app{max-width:1000px;margin:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
#messages{height:480px;overflow:auto;background:var(--card);border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,0.7)}
.msg{margin:10px 0;padding:12px;border-radius:14px;max-width:75%;position:relative;display:flex;align-items:flex-start;gap:8px}
.mine{margin-left:auto;background:linear-gradient(90deg,var(--secondary),var(--primary));color:#012026}
.bot{background:rgba(255,255,255,0.05)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#042024}
.composer{display:flex;gap:10px;margin-top:10px}
.input{flex:1;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:inherit}
.button{padding:10px 16px;border-radius:14px;border:none;cursor:pointer;font-weight:bold;transition:0.2s}
.button:hover{transform:scale(1.05)}
.groc{background:var(--accent);color:black}
.primary{background:var(--primary);color:white}
.typing{display:inline-flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#aaa;animation:dance 1s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes dance{0%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}100%{opacity:.3}}
video{border-radius:12px;max-width:300px;display:none}
</style>
</head>
<body>
<div class="app">
<h2>Chatbot SUPER ULTRA 🎉🤖</h2>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button id="openKey" class="button groc">🔑 API Key</button>
<button id="cameraBtn" class="button primary">📷 Telecamera</button>
<button id="voiceBtn" class="button primary">🎤 Voce</button>
<button id="emojiBtn" class="button">😀 Emoji</button>
<button id="clear" class="button">🧹 Pulisci</button>
</div>
<video id="camera" autoplay playsinline></video>
<div id="messages"></div>
<div class="composer">
<input id="inputText" class="input" placeholder="Scrivi un messaggio..." autocomplete="off" />
<button id="send" class="button groc">💬 Invia</button>
</div>
</div>
<div id="keyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;display:flex">
<div style="background:var(--card);padding:20px;border-radius:16px;width:90%;max-width:400px">
<h3>Inserisci Groq API Key 🔑</h3>
<input id="apiKey" placeholder="gsk_..." style="width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:inherit" />
<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
<button id="saveKey" class="button groc">💾 Salva</button>
<button id="closeModal" class="button">❌ Chiudi</button>
</div>
</div>
</div>
<script>
const messages=document.getElementById("messages")
const input=document.getElementById("inputText")
const camera=document.getElementById("camera")
const keyModal=document.getElementById("keyModal")
const apiKeyEl=document.getElementById("apiKey")function addMine(t){let d=document.createElement("div");d.className="msg mine";d.textContent=t;messages.appendChild(d);messages.scrollTop=messages.scrollHeight} function addBot(t){let d=document.createElement("div");d.className="msg bot";d.textContent=t;messages.appendChild(d);messages.scrollTop=messages.scrollHeight} function typing(){let d=document.createElement("div");d.className="msg bot";d.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';messages.appendChild(d);messages.scrollTop=messages.scrollHeight;return d}

function getKey(){return localStorage.getItem("groq_key")} function setKey(k){localStorage.setItem("groq_key",k)}

// Event listeners tasti modal document.getElementById("openKey").addEventListener('click',()=>{keyModal.style.display="flex"}) document.getElementById("closeModal").addEventListener('click',()=>{keyModal.style.display="none"}) document.getElementById("saveKey").addEventListener('click',()=>{ let k=apiKeyEl.value.trim(); if(!k){alert("Inserisci la chiave"); return} setKey(k); keyModal.style.display="none"; alert("Chiave salvata") })

// Invia messaggio async function sendMessage(text){ if(!text) return addMine(text) let t=typing() try{ let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{ method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+getKey()}, body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:text}]}) }) let data=await res.json() t.remove() let reply=data.choices?.[0]?.message?.content||"Nessuna risposta" addBot(reply) }catch(e){t.remove();addBot("Errore")} }

document.getElementById("send").addEventListener('click',()=>{ let t=input.value.trim(); if(!t) return; input.value=""; sendMessage(t) }) input.addEventListener('keydown',e=>{if(e.key==="Enter"){let t=input.value.trim(); if(!t)return; input.value=""; sendMessage(t)}})

// Telecamera document.getElementById("cameraBtn").addEventListener('click',async()=>{ try{let stream=await navigator.mediaDevices.getUserMedia({video:true});camera.srcObject=stream;camera.style.display="block"}catch(e){alert("Camera non disponibile")} })

// Voce let recognition if('webkitSpeechRecognition' in window){recognition=new webkitSpeechRecognition();recognition.lang="it-IT";recognition.onresult=e=>{input.value=e.results[0][0].transcript}} document.getElementById("voiceBtn").addEventListener('click',()=>{if(!recognition)return alert("Voce non supportata");recognition.start()})

// Emoji picker document.getElementById("emojiBtn").addEventListener('click',()=>{ let emojis=["😀","😂","😍","😎","🤖","🎉","💡","🔥"] input.value+=emojis[Math.floor(Math.random()*emojis.length)] })

// Pulisci document.getElementById("clear").addEventListener('click',()=>{messages.innerHTML=""}) </script>

</body>
</html>
