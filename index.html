<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0e8;
      --paper:    #faf7f2;
      --ink:      #1a1612;
      --ink2:     #4a4540;
      --border:   #d8d0c4;
      --accent:   #c94a1a;
      --accent2:  #e8730a;
      --gold:     #b8960a;
      --user-bg:  #1a1612;
      --ai-bg:    #fff;
      --shadow:   rgba(26,22,18,.10);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Texture grain */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* ══ CHAT LAYOUT ══ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ══ HEADER ══ */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px 18px;
      border-bottom: 2px solid var(--ink);
      background: var(--paper);
      flex-shrink: 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute; bottom: -5px; left: 0; right: 0; height: 2px;
      background: var(--border);
    }

    .brand {
      display: flex; align-items: baseline; gap: 10px;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: var(--ink);
      line-height: 1;
    }
    .brand-name span { color: var(--accent); }
    .brand-tag {
      font-size: .65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink2);
      font-weight: 500;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .model-pill {
      font-size: .62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--bg);
      padding: 4px 12px;
      border-radius: 2px;
      font-weight: 500;
    }

    /* ══ STATUS BAR ══ */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 28px;
      background: var(--ink);
      color: var(--bg);
      font-size: .68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4caf50;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ══ MESSAGES ══ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--bg);
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .welcome-icon {
      font-size: 3rem;
      line-height: 1;
    }
    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1.1;
    }
    .welcome h2 em {
      color: var(--accent);
      font-style: italic;
    }
    .welcome p {
      font-size: .85rem;
      color: var(--ink2);
      line-height: 1.7;
      max-width: 340px;
    }
    .welcome-divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 14px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; flex-shrink: 0;
      letter-spacing: .5px;
      margin-top: 2px;
    }
    .msg.user .avatar {
      background: var(--ink);
      color: var(--bg);
    }
    .msg.ai .avatar {
      background: var(--accent);
      color: white;
    }

    .bubble {
      max-width: 76%;
      padding: 14px 18px;
      font-size: .88rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--bg);
      border-radius: 2px 2px 2px 12px;
      border-left: 3px solid var(--accent);
    }
    .msg.ai .bubble {
      background: var(--ai-bg);
      color: var(--ink);
      border-radius: 2px 2px 12px 2px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      box-shadow: 0 2px 12px var(--shadow);
    }

    /* Typing */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; background: var(--accent2); }
    @keyframes blink { 0%,60%,100% { transform: scale(.7); opacity: .3; } 30% { transform: scale(1); opacity: 1; } }

    /* ══ INPUT ══ */
    .input-zone {
      flex-shrink: 0;
      background: var(--paper);
      border-top: 2px solid var(--ink);
      padding: 18px 28px 22px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 13px 16px;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      line-height: 1.6;
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 150px;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: #aaa; }

    #send-btn {
      width: 50px; height: 50px;
      background: var(--ink);
      border: none; border-radius: 4px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .12s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent); transform: translateY(-1px); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      margin-top: 8px;
      font-size: .62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink2);
      opacity: .6;
    }

    /* Side rule decorations */
    #app::before {
      content: '';
      position: fixed; top: 0; left: calc(50% - 390px - 20px); bottom: 0;
      width: 1px; background: var(--border); pointer-events: none;
      display: none;
    }
    @media (min-width: 900px) { #app::before { display: block; } }
  </style>
</head>
<body>

<div id="app">

  <header>
    <div class="brand">
      <div class="brand-name">AI<span>.</span>Chat</div>
      <div class="brand-tag">Powered by Groq</div>
    </div>
    <div class="header-right">
      <div class="model-pill" id="model-pill">llama-3.3-70b</div>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span>Connesso — pronto a rispondere</span>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <div class="welcome-divider"></div>
      <h2>Ciao,<br/>sono <em>AI Chat</em></h2>
      <p>Scrivi qualsiasi cosa. Rispondo in un istante grazie alla velocità di Groq.</p>
    </div>
  </div>

  <div class="input-zone">
    <div class="input-row">
      <textarea id="user-input" placeholder="Scrivi il tuo messaggio…" rows="1"></textarea>
      <button id="send-btn" title="Invia">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="input-hint">Invio per inviare &nbsp;·&nbsp; Shift+Invio per andare a capo</div>
  </div>

</div>

<script>
  // ╔══════════════════════════════════════╗
  // ║   INSERISCI QUI LA TUA API KEY       ║
  const GROQ_API_KEY = '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';
  const GROQ_MODEL   = 'llama-3.3-70b-versatile';
  // ╚══════════════════════════════════════╝

  let history = [], isLoading = false;

  const messagesEl = document.getElementById('messages');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcome    = document.getElementById('welcome');
  const modelPill  = document.getElementById('model-pill');

  modelPill.textContent = GROQ_MODEL.split('-').slice(0,3).join('-');

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) send(); }
  });
  sendBtn.addEventListener('click', () => { if (!isLoading) send(); });

  function addBubble(role, text) {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'user' ? 'TU' : 'AI';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;

    msg.appendChild(av);
    msg.appendChild(bub);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bub;
  }

  function showTyping() {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ai'; msg.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    msg.appendChild(av); msg.appendChild(bub);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const text = userInput.value.trim();
    if (!text) return;

    isLoading = true; sendBtn.disabled = true;
    userInput.value = ''; userInput.style.height = 'auto';

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_API_KEY
        },
        body: JSON.stringify({ model: GROQ_MODEL, messages: history, max_tokens: 1024 })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBubble('ai', '⚠ Errore: ' + (err.error?.message || 'Risposta non valida.'));
        history.pop();
      } else {
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '(nessuna risposta)';
        addBubble('ai', reply);
        history.push({ role: 'assistant', content: reply });
      }
    } catch(e) {
      removeTyping();
      addBubble('ai', '⚠ Errore di rete: ' + e.message);
      history.pop();
    }

    isLoading = false; sendBtn.disabled = false; userInput.focus();
  }
</script>
</body>
</html>
