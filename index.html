<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator - Omar</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  background: rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
img {
  margin-top:15px;
  max-width:100%;
  border-radius:10px;
}
a {
  color:#00c6ff;
}
</style>
</head>
<body>
<div class="container">
  <h2>AI Imagine Generator</h2>
  <p>Creato da lo sviluppatore Omar</p>
  <p><a href="https://ai-bot-video-generator-kling-ai.vercel.app/" target="_blank">Il nostro Chat Bot</a></p>  <input type="password" id="apiKey" placeholder="Inserisci chiave Groq">
  <textarea id="prompt" placeholder="Scrivi cosa vuoi creare"></textarea><button onclick="startMic()">🎤 Microfono</button> <button onclick="generateImage()">Genera Immagine</button>

  <img id="result" />
</div><script>
let recognition;

function startMic() {
  if (!('webkitSpeechRecognition' in window)) {
    alert('Microfono non supportato');
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = 'it-IT';

  recognition.onresult = function(event) {
    document.getElementById('prompt').value = event.results[0][0].transcript;
  };

  recognition.start();
}

async function generateImage() {
  const apiKey = document.getElementById('apiKey').value;
  const prompt = document.getElementById('prompt').value;

  if (!apiKey || !prompt) {
    alert('Inserisci chiave e testo');
    return;
  }

  try {
    const response = await fetch('https://api.groq.com/openai/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-image-1',
        prompt: prompt
      })
    });

    const data = await response.json();
    document.getElementById('result').src = data.data[0].url;
  } catch (e) {
    alert('Errore: ' + e.message);
  }
}
</script></body>
</html>
