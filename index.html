<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator PRO MAX - Omar</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:420px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.7);
}
input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}
button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover { background:#00a2cc; }
img {
  margin-top:15px;
  max-width:100%;
  border-radius:12px;
}
.loader { display:none; margin-top:10px; }
a { color:#00c6ff; }
.history img {
  width:70px;
  margin:5px;
  border-radius:8px;
}
</style>
</head>
<body>
<div class="container">
  <h2>🚀 AI Imagine Generator</h2>
  <p>Creato da lo sviluppatore Omar</p>
  <p><a href="https://ai-bot-video-generator-kling-ai.vercel.app/" target="_blank">Il nostro Chat Bot</a></p>  <input type="password" id="apiKey" placeholder="Chiave OpenAI">
  <textarea id="prompt" placeholder="Scrivi cosa vuoi creare"></textarea><button onclick="startMic()">🎤 Microfono</button> <button onclick="enhancePrompt()">✨ Migliora Prompt</button> <button onclick="generateImage()">🎨 Genera</button> <button onclick="downloadImage()">📥 Download</button>

  <div class="loader" id="loader">⏳ Generazione...</div>
  <img id="result" />  <h3>📜 Storico</h3>
  <div class="history" id="history"></div>
</div><script>
let recognition;

// salva chiave
window.onload = () => {
  const savedKey = localStorage.getItem('openai_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;
}

function startMic() {
  if (!('webkitSpeechRecognition' in window)) {
    alert('Microfono non supportato');
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = 'it-IT';

  recognition.onresult = function(event) {
    document.getElementById('prompt').value = event.results[0][0].transcript;
  };

  recognition.start();
}

function enhancePrompt() {
  let p = document.getElementById('prompt').value;
  if (!p) return;
  document.getElementById('prompt').value = p + ", ultra realistic, 4k, detailed, cinematic lighting";
}

async function generateImage() {
  const apiKey = document.getElementById('apiKey').value;
  const prompt = document.getElementById('prompt').value;

  if (!apiKey || !prompt) {
    alert('Inserisci chiave e testo');
    return;
  }

  localStorage.setItem('openai_key', apiKey);
  document.getElementById('loader').style.display = 'block';

  try {
    const response = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'gpt-image-1',
        prompt: prompt,
        size: '1024x1024'
      })
    });

    const data = await response.json();
    console.log(data);

    if (!data.data || !data.data[0]) {
      alert('Errore: ' + (data.error?.message || 'Risposta non valida'));
      return;
    }

    const imgUrl = data.data[0].url;
    document.getElementById('result').src = imgUrl;

    addToHistory(imgUrl);

  } catch (e) {
    alert('Errore: ' + e.message);
  }

  document.getElementById('loader').style.display = 'none';
}

function downloadImage() {
  const img = document.getElementById('result').src;
  if (!img) return alert('Nessuna immagine');

  const a = document.createElement('a');
  a.href = img;
  a.download = 'ai-image.png';
  a.click();
}

function addToHistory(url) {
  const div = document.getElementById('history');
  const img = document.createElement('img');
  img.src = url;
  div.prepend(img);
}
</script></body>
</html>
