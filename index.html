<!doctype html>

<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chatbot MOBILE ULTRA 🎉</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#071025;color:white;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;height:100vh;}
.app{width:100%;max-width:600px;padding:10px;display:flex;flex-direction:column;gap:10px;flex:1}
#messages{flex:1;overflow:auto;background:#111827;border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px;border-radius:12px;max-width:75%}
.mine{align-self:flex-end;background:linear-gradient(90deg,#0ea5a5,#06b6d4);color:#012026}
.bot{align-self:flex-start;background:rgba(255,255,255,0.05)}
.composer{display:flex;gap:6px;flex-wrap:wrap}
.input{flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:white}
.button{padding:8px 12px;border-radius:12px;border:none;cursor:pointer;font-weight:bold}
.groc{background:#ffd700;color:black}
.primary{background:#06b6d4;color:white}
video{display:none;width:100%;border-radius:12px}
#keyModal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
#keyModalContent{background:#111827;padding:20px;border-radius:16px;width:90%;max-width:400px;display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div class="app">
<h2>Chatbot MOBILE ULTRA 🎉🤖</h2>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button id="openKey" class="button groc">🔑 API Key</button>
<button id="cameraBtn" class="button primary">📷 Telecamera</button>
<button id="voiceBtn" class="button primary">🎤 Voce</button>
<button id="emojiBtn" class="button">😀 Emoji</button>
<button id="clear" class="button">🧹 Pulisci</button>
</div>
<video id="camera" autoplay playsinline></video>
<div id="messages"></div>
<div class="composer">
<input id="inputText" class="input" placeholder="Scrivi un messaggio...">
<button id="send" class="button groc">💬 Invia</button>
</div>
</div>
<div id="keyModal">
<div id="keyModalContent">
<h3>Inserisci Groq API Key 🔑</h3>
<input id="apiKey" placeholder="gsk_...">
<div style="display:flex;justify-content:flex-end;gap:10px">
<button id="saveKey" class="button groc">💾 Salva</button>
<button id="closeModal" class="button">❌ Chiudi</button>
</div>
</div>
</div>
<script>
const messages=document.getElementById('messages');
const input=document.getElementById('inputText');
const camera=document.getElementById('camera');
const keyModal=document.getElementById('keyModal');
const apiKeyEl=document.getElementById('apiKey');function addMine(text){let d=document.createElement('div');d.className='msg mine';d.textContent=text;messages.appendChild(d);messages.scrollTop=messages.scrollHeight} function addBot(text){let d=document.createElement('div');d.className='msg bot';d.textContent=text;messages.appendChild(d);messages.scrollTop=messages.scrollHeight} function typing(){let d=document.createElement('div');d.className='msg bot';d.textContent='Scrivendo...';messages.appendChild(d);messages.scrollTop=messages.scrollHeight;return d}

function getKey(){return localStorage.getItem('groq_key')} function setKey(k){localStorage.setItem('groq_key',k)}

document.getElementById('openKey').addEventListener('click',()=>{keyModal.style.display='flex'}) document.getElementById('closeModal').addEventListener('click',()=>{keyModal.style.display='none'}) document.getElementById('saveKey').addEventListener('click',()=>{ let k=apiKeyEl.value.trim();if(!k){alert('Inserisci la chiave');return}setKey(k);keyModal.style.display='none';alert('Chiave salvata') })

document.getElementById('send').addEventListener('click',()=>{ let t=input.value.trim();if(!t)return;input.value='';sendMessage(t) }) input.addEventListener('keydown',e=>{if(e.key==='Enter'){let t=input.value.trim();if(!t)return;input.value='';sendMessage(t)}})

document.getElementById('cameraBtn').addEventListener('click',async()=>{ try{let stream=await navigator.mediaDevices.getUserMedia({video:true});camera.srcObject=stream;camera.style.display='block'}catch(e){alert('Camera non disponibile')} })

let recognition; if('webkitSpeechRecognition' in window){recognition=new webkitSpeechRecognition();recognition.lang='it-IT';recognition.onresult=e=>{input.value=e.results[0][0].transcript}} document.getElementById('voiceBtn').addEventListener('click',()=>{if(!recognition)return alert('Voce non supportata');recognition.start()})

document.getElementById('emojiBtn').addEventListener('click',()=>{let emojis=['😀','😂','😍','😎','🤖','🎉','💡','🔥'];input.value+=emojis[Math.floor(Math.random()*emojis.length)]}) document.getElementById('clear').addEventListener('click',()=>{messages.innerHTML=''})

async function sendMessage(text){addMine(text);let t=typing();try{ let res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getKey()},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:text}]})}); let data=await res.json();t.remove();let reply=data.choices?.[0]?.message?.content||'Nessuna risposta';addBot(reply); }catch(e){t.remove();addBot('Errore')} } </script>

</body>
</html>
