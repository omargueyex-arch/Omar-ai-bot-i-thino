<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Omar AI — Gratis</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --border: #1e1e2e;
  --accent: #7c3aed;
  --accent2: #06d6a0;
  --user-c: #a78bfa;
  --text: #e2e8f0;
  --muted: #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; top: -20vh; left: -10vw;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: blob 12s ease-in-out infinite alternate;
}
@keyframes blob { from{transform:translate(0,0)} to{transform:translate(8vw,6vh) scale(1.1)} }

.blob2 { position:fixed; bottom:-15vh; right:-5vw; width:50vw; height:50vw; background:radial-gradient(circle,rgba(6,214,160,0.08) 0%,transparent 70%); pointer-events:none; z-index:0; animation:blob2 15s ease-in-out infinite alternate; }
@keyframes blob2 { from{transform:translate(0,0)} to{transform:translate(-6vw,-4vh) scale(1.08)} }

.shell { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; max-width:760px; margin:0 auto; }

header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; background:rgba(13,13,18,0.9); backdrop-filter:blur(20px); flex-shrink:0; }
.avatar { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:20px; animation:pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.4)} 50%{box-shadow:0 0 35px rgba(124,58,237,0.7)} }
.hinfo h1 { font-size:17px; font-weight:800; color:#fff; }
.hinfo p { font-size:11px; color:var(--accent2); font-family:'Space Mono',monospace; margin-top:1px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--accent2); display:inline-block; margin-right:5px; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.badge { margin-left:auto; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:6px; padding:4px 8px; }

#chat { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:6px; }
#chat::-webkit-scrollbar{width:4px} #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:40px 20px; animation:fadeUp 0.6s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.welcome-icon { font-size:52px; animation:float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.welcome h2 { font-size:24px; font-weight:800; background:linear-gradient(135deg,var(--user-c),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.welcome p { color:var(--muted); font-size:14px; max-width:320px; line-height:1.6; }
.chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
.chip { background:rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.25); color:var(--user-c); border-radius:20px; padding:6px 14px; font-size:12px; cursor:pointer; transition:all 0.2s; font-family:'Space Mono',monospace; }
.chip:hover { background:rgba(124,58,237,0.2); transform:translateY(-2px); }

.msg-wrap { display:flex; gap:10px; animation:msgIn 0.3s ease both; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-wrap.user { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; margin-top:2px; }
.msg-wrap.bot .msg-av { background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(6,214,160,0.3)); border:1px solid rgba(124,58,237,0.3); }
.msg-wrap.user .msg-av { background:rgba(167,139,250,0.15); border:1px solid rgba(167,139,250,0.2); }
.msg-bubble { max-width:calc(100% - 50px); }
.msg-text { padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.6; word-break:break-word; }
.msg-wrap.bot .msg-text { background:rgba(6,214,160,0.06); border:1px solid rgba(6,214,160,0.12); color:#d1fae5; border-bottom-left-radius:4px; }
.msg-wrap.user .msg-text { background:rgba(124,58,237,0.12); border:1px solid rgba(124,58,237,0.2); color:var(--user-c); border-bottom-right-radius:4px; text-align:right; }
.msg-time { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:4px; padding:0 4px; }
.msg-wrap.user .msg-time { text-align:right; }

.typing-wrap { display:flex; gap:10px; animation:msgIn 0.3s ease both; }
.typing-bubble { padding:12px 16px; background:rgba(6,214,160,0.06); border:1px solid rgba(6,214,160,0.12); border-radius:14px; border-bottom-left-radius:4px; display:flex; gap:5px; align-items:center; }
.typing-bubble span { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:tdot 1.2s ease-in-out infinite; }
.typing-bubble span:nth-child(2){animation-delay:0.2s} .typing-bubble span:nth-child(3){animation-delay:0.4s}
@keyframes tdot { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }

.input-area { padding:12px 16px 16px; border-top:1px solid var(--border); background:rgba(13,13,18,0.9); backdrop-filter:blur(20px); flex-shrink:0; }
.input-row { display:flex; gap:10px; align-items:flex-end; }
textarea { flex:1; padding:11px 16px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; outline:none; resize:none; min-height:44px; max-height:120px; line-height:1.5; transition:border-color 0.2s; }
textarea:focus { border-color:rgba(124,58,237,0.5); box-shadow:0 0 0 3px rgba(124,58,237,0.08); }
textarea::placeholder { color:var(--muted); }
.send-btn { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--accent),#5b21b6); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:all 0.2s; box-shadow:0 4px 15px rgba(124,58,237,0.3); }
.send-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(124,58,237,0.5); }
.send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
.input-footer { margin-top:6px; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); text-align:center; }

.msg-text strong { color:#fff; font-weight:700; }
.msg-text em { color:var(--accent2); }
.msg-text code { font-family:'Space Mono',monospace; font-size:12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:1px 5px; }
</style>
</head>
<body>
<div class="blob2"></div>
<div class="shell">

  <header>
    <div class="avatar">🤖</div>
    <div class="hinfo">
      <h1>Omar AI</h1>
      <p><span class="dot"></span>online · Gratis</p>
    </div>
    <div class="badge">100% FREE</div>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>Ciao Omar!</h2>
      <p>Il tuo bot AI personale — gratis, senza API key, apri e usa subito!</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('Ciao! Come stai?')">👋 Saluta</div>
        <div class="chip" onclick="quickSend('Quanto fa 25 per 4?')">🧮 Calcolo</div>
        <div class="chip" onclick="quickSend('Dimmi una barzelletta')">😂 Barzelletta</div>
        <div class="chip" onclick="quickSend('Dammi consigli per Rocket League')">🎮 Rocket League</div>
        <div class="chip" onclick="quickSend('Che ore sono?')">🕐 Ora</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="inputText" placeholder="Scrivi un messaggio..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-footer">Omar AI • 100% Gratis • Enter per inviare</div>
  </div>

</div>
<script>
// ── Sistema di risposta locale intelligente ──────────────────────────────────
// Prima prova risposte locali veloci, poi chiama AI gratis online

const PERSONA = {
  name: "Omar AI",
  creator: "Omar",
  greetings: ["Ciao Omar! 😊", "Ehi Omar! 👋", "Ciao! Come posso aiutarti? 😄"],
  jokes: [
    "Perché il computer andò dal dottore? Perché aveva un virus! 😂",
    "Cosa dice uno zero all'otto? Bella cintura! 😅",
    "Perché i matematici sono sempre calmi? Perché sanno i loro limiti! 😄",
    "Cosa fa un nuvola quando incontra un'altra nuvola? Si mettono a chiacchierare... di nebbia! ⛅",
    "Come si chiama un pesce senza occhi? Un psce! 🐟😂"
  ],
  rlTips: [
    "Per migliorare in Rocket League: allena i aerial shots ogni giorno per 15 minuti 🚀",
    "Il segreto in RL è il boost management — non sprecare mai boost sopra il 50%! ⚡",
    "Per fare freestyle: inizia con air dribble, poi impara i flicks! 🎮",
    "Usa la rotazione sempre — non inseguire mai la palla da solo! 🔄",
    "Per salire di rank: concentrati sui fondamentali, non sui trick shots! 🏆"
  ]
};

// Risposte locali istantanee
function tryLocalReply(text) {
  const t = text.toLowerCase().trim();

  // Ora e data
  if (t.match(/\b(ora|ore|time|orario|che ora)\b/)) {
    const d = new Date();
    return `Sono le ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 🕒`;
  }
  if (t.match(/\b(data|giorno|oggi|day|date)\b/)) {
    const d = new Date();
    const giorni = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
    const mesi = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
    return `Oggi è ${giorni[d.getDay()]} ${d.getDate()} ${mesi[d.getMonth()]} ${d.getFullYear()} 📅`;
  }

  // Saluti
  if (t.match(/^(ciao|hello|hola|salut|hey|hi|buongiorno|buonasera|buonanotte)[\s!]*$/)) {
    const h = new Date().getHours();
    if (t.includes("buonanotte")) return "Buonanotte Omar! 🌙 Dormi bene!";
    if (t.includes("buongiorno") || h < 12) return "Buongiorno Omar! 🌞 Pronto per oggi?";
    if (h < 18) return PERSONA.greetings[Math.floor(Math.random()*PERSONA.greetings.length)];
    return "Buonasera Omar! 🌆 Come è andata oggi?";
  }

  // Come stai
  if (t.match(/come (stai|va|ti senti)/)) return "Sto benissimo, grazie! 😄 E tu?";

  // Chi sei / creatore
  if (t.match(/chi (sei|ti ha fatto|ti ha creato)|come ti chiami|sei stato creato/))
    return "Sono Omar AI, il tuo assistente personale creato da Omar! 🤖";

  // Barzellette
  if (t.match(/barzelletta|joke|ridere|divertente|fai ridere/))
    return PERSONA.jokes[Math.floor(Math.random()*PERSONA.jokes.length)];

  // Rocket League
  if (t.match(/rocket.?league|rl |freestyle|aerial|boost|rank|goal/))
    return PERSONA.rlTips[Math.floor(Math.random()*PERSONA.rlTips.length)];

  // Calcoli
  const calcResult = tryCalc(t);
  if (calcResult !== null) return `Il risultato è **${calcResult}** ✅`;

  // Grazie
  if (t.match(/\b(grazie|thanks|merci|perfetto|ottimo|bravo)\b/)) return "Figurati! 😊 Sono qui se hai bisogno!";

  return null; // nessuna risposta locale → chiama AI
}

function tryCalc(t) {
  let expr = t
    .replace(/quanto fa\s*/i,"").replace(/calcola\s*/i,"")
    .replace(/\bper\b/g,"*").replace(/×/g,"*").replace(/x(?=\s*\d)/g,"*")
    .replace(/\bdiviso\b/g,"/").replace(/÷/g,"/")
    .replace(/\bpiù\b/g,"+").replace(/\bmeno\b/g,"-")
    .replace(/,(\d)/g,".$1")
    .replace(/[^0-9\+\-\*\/\.\s\(\)]/g,"").trim();
  if (!expr || !/[+\-*/]/.test(expr)) return null;
  try {
    const v = Function('"use strict";return('+expr+')')();
    if (typeof v === 'number' && isFinite(v)) return Math.round(v*10000)/10000;
  } catch(e) {}
  return null;
}

// ── AI gratis via Hugging Face (no key) ─────────────────────────────────────
async function callFreeAI(userText, history) {
  // Costruiamo un prompt in stile chat
  const systemMsg = `Sei Omar AI, un assistente amichevole creato da Omar. Rispondi sempre in italiano, in modo breve e diretto. Sei esperto di matematica, gaming, scuola e tecnologia.`;

  // Usiamo il modello Mistral-7B su Hugging Face Inference API (gratuita, no key)
  const historyText = history.slice(-6).map(m =>
    m.role === 'user' ? `Utente: ${m.content}` : `Omar AI: ${m.content}`
  ).join('\n');

  const prompt = `<s>[INST] ${systemMsg}\n\n${historyText}\nUtente: ${userText} [/INST]`;

  const res = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      inputs: prompt,
      parameters: {
        max_new_tokens: 300,
        temperature: 0.7,
        return_full_text: false,
        stop: ["Utente:", "[INST]", "</s>"]
      }
    })
  });

  if (!res.ok) throw new Error(`HF error ${res.status}`);
  const data = await res.json();

  let reply = "";
  if (Array.isArray(data) && data[0]?.generated_text) {
    reply = data[0].generated_text;
  } else if (data.error) {
    // Modello in caricamento su HF — aspetta e riprova
    if (data.error.includes("loading")) {
      await new Promise(r => setTimeout(r, 8000));
      return callFreeAI(userText, history);
    }
    throw new Error(data.error);
  }

  // Pulizia risposta
  reply = reply
    .replace(/^Omar AI:\s*/i,"")
    .replace(/^Assistant:\s*/i,"")
    .replace(/\[INST\].*?\[\/INST\]/gs,"")
    .replace(/<s>|<\/s>/g,"")
    .trim();

  return reply || "Non ho capito, puoi ripetere? 😊";
}

// ── UI helpers ───────────────────────────────────────────────────────────────
let chatHistory = [];
let isLoading = false;

function getTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatText(text) {
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/`(.*?)`/g,"<code>$1</code>")
    .replace(/\n/g,"<br>");
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, text) {
  removeWelcome();
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'bot' ? '🤖' : '👤';
  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  const txt = document.createElement('div');
  txt.className = 'msg-text';
  txt.innerHTML = role === 'bot' ? formatText(text) : text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
  bub.appendChild(txt); bub.appendChild(time);
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  removeWelcome();
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap'; wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.style.cssText = 'width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(6,214,160,0.3));border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;';
  av.textContent = '🤖';
  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ── Main send ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('inputText');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; inp.style.height = '44px';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMsg('user', text);
  showTyping();

  // 1) prova risposta locale istantanea
  const local = tryLocalReply(text);
  if (local) {
    await new Promise(r => setTimeout(r, 400)); // piccola pausa realistica
    removeTyping();
    appendMsg('bot', local);
    chatHistory.push({role:'user',content:text},{role:'assistant',content:local});
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    return;
  }

  // 2) chiama AI gratis online
  try {
    const reply = await callFreeAI(text, chatHistory);
    removeTyping();
    appendMsg('bot', reply);
    chatHistory.push({role:'user',content:text},{role:'assistant',content:reply});
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch(e) {
    removeTyping();
    // Fallback intelligente se AI offline
    appendMsg('bot', fallback(text));
    console.error(e);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

function fallback(text) {
  const t = text.toLowerCase();
  if (t.match(/perch[eé]/)) return "È una bella domanda! Ci sono molte ragioni possibili — puoi essere più specifico? 🤔";
  if (t.match(/come/)) return "Posso guidarti passo passo — dimmi esattamente cosa vuoi fare! 😊";
  if (t.match(/dove/)) return "Dipende dal contesto — puoi darmi più dettagli? 📍";
  if (t.match(/\?/)) return "Ottima domanda! Dimmi di più così posso risponderti meglio 🤓";
  return `Interessante! Puoi darmi più dettagli su "${text.slice(0,40)}${text.length>40?'...':''}"? 😊`;
}

function quickSend(t) { document.getElementById('inputText').value = t; sendMessage(); }
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

window.addEventListener('load', () => document.getElementById('inputText').focus());
</script>
</body>
</html>
