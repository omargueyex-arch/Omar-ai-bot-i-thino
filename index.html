<!DOCTYPE html>  <html lang="it">  
<head>  
<meta charset="utf-8">  
<meta name="viewport" content="width=device-width,initial-scale=1">  
<title>Bot AI Avanzato (locale) - Omar</title>  
<style>  
  :root{--bg:#000;--panel:#111;--accent:#0a84ff;--user:#00aaff;--bot:#00ff88;color-scheme:dark}  
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif}  
  .wrap{max-width:720px;margin:0 auto;padding:18px}  
  h1{font-size:20px;margin:6px 0 12px}  
  #chat{background:var(--panel);border:1px solid #222;border-radius:12px;height:60vh;overflow:auto;padding:12px}  
  .row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px}  
  input[type="text"]{flex:1;padding:10px;border-radius:8px;border:none;outline:none;background:#1b1b1b;color:#fff}  
  button{background:var(--accent);border:none;color:#fff;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700}  
  .msg{margin:6px 0;padding:8px 10px;border-radius:8px;max-width:85%;}  
  .user{background:rgba(0,170,255,0.08);color:var(--user);align-self:flex-end;text-align:left}  
  .bot{background:rgba(0,255,136,0.06);color:var(--bot);align-self:flex-start;text-align:left}  
  .meta{font-size:12px;opacity:0.7;margin-top:6px}  
  @media(max-width:520px){h1{font-size:18px}}  
</style>  
</head>  
<body>  
<div class="wrap">  
  <h1>🤖 Bot AI Avanzato — Offline (solo SPCK)</h1>    <div id="chat" aria-live="polite"></div>    <div id="startArea" class="row">  
    <button id="startBtn">Inizia Chat</button>  
  </div>    <div id="inputArea" class="row" style="display:none">  
    <input id="inputText" type="text" placeholder="Scrivi qualcosa... (premi Enter per inviare)">  
    <button id="sendBtn">Invia</button>  
  </div>  
  <p class="meta">Local-only • Correzione parole • Calcoli • Multilingua • Non servono API</p>  
</div>  <script>  
/* -------------------------  
   Utility: scroll to bottom  
   ------------------------- */  
function scrollChat(){  
  const c = document.getElementById('chat');  
  c.scrollTop = c.scrollHeight;  
}  
  
/* -------------------------  
   Levenshtein (edit distance)  
   returns integer distance  
   ------------------------- */  
function levenshtein(a,b){  
  if(a===b) return 0;  
  const m = a.length, n = b.length;  
  if(m===0) return n;  
  if(n===0) return m;  
  let prev = new Array(n+1), cur = new Array(n+1);  
  for(let j=0;j<=n;j++) prev[j]=j;  
  for(let i=1;i<=m;i++){  
    cur[0]=i;  
    for(let j=1;j<=n;j++){  
      const cost = a[i-1] === b[j-1] ? 0 : 1;  
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);  
    }  
    [prev,cur] = [cur,prev];  
  }  
  return prev[n];  
}  
  
/* -------------------------  
   Helpers: sanitize and tokenize  
   ------------------------- */  
function normalizeText(s){  
  return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();  
}  
function cleanForCalc(s){  
  // replace words with operators, allow numbers and operators only  
  return s.toLowerCase()  
          .replace(/\bx\b/g,"*")  
          .replace(/per/g,"*")  
          .replace(/×/g,"*")  
          .replace(/diviso|\/|÷/g,"/")  
          .replace(/,(\d{1,})/g,".$1") // accept comma decimals  
          .replace(/[^0-9\+\-\*\/\.\s]/g,"");  
}  
  
/* -------------------------  
   Small random emoji helper  
   ------------------------- */  
function chooseEmoji(list){ return list[Math.floor(Math.random()*list.length)]; }  
  
/* -------------------------  
   Knowledge base (multilingue)  
   - add/extend entries here  
   - each entry: {keywords:[...], reply: string|function}  
   ------------------------- */  
const risposte = [  
  {keywords:["ciao","hello","hola","bonjour","salut","ndax"], reply: ()=> `Ciao! ${chooseEmoji(["😊","😄","👋"])}`},  
  
  {keywords:["come ti chiami","what is your name"], reply: "Sono il tuo Bot AI personale, creato da Omar 🤖"},  
  
  {keywords:["omar","chi ti ha creato","omar ti ha fatto","sei stato creato da omar","omar ti ha programmato","ti ha fatto omar"], reply: ()=> {  
    const r = [  
      "Sono stato creato da Omar 😎",  
      "Il mio sviluppatore è Omar!",  
      "Omar mi ha programmato 🤖",  
      "Grazie a Omar esisto!",  
      "Omar è il mio creatore 👑",  
      "Sono il bot personale di Omar!"  
    ];  
    return r[Math.floor(Math.random()*r.length)];  
  }},  
  
  {keywords:["come stai","how are you","ça va"], reply: ()=> `Sto bene, grazie! ${chooseEmoji(["😄","🙂","👍"])}`},  
  
  {keywords:["grazie","thanks","merci"], reply: "Figurati! 😊"},  
  
  {keywords:["ora","time","che ore"], reply: ()=>{   
    const d=new Date();   
    return `Sono le ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 🕒`;   
  }},  
  
  {keywords:["giorno","data","oggi","day","date"], reply: ()=>{   
    const d=new Date();   
    return `Oggi è ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} 📅`;   
  }},  
  
  {keywords:["eta","anni","how old"], reply: "Non ho età reale — sono un bot, sempre giovane! 😎"},  
  
  {keywords:["wolof"], reply: "Ndax nga def? Maa ngi fi! (Posso parlare anche wolof)"},  
  
  {keywords:["rocket league","rocketleague"], reply: "Vuoi consigli su freestyling o impostazioni? 🎮"},  
  
  {keywords:["scuola","compiti","homework"], reply: "Posso aiutarti con esercizi e spiegazioni, prova a chiedere un problema specifico 📚"},  
  
  {keywords:["pizza","mangiare","food","cibo"], reply: "Adoro la pizza! 🍕 Tu quale preferisci?"},  
  
  {keywords:["film","movie","film preferito"], reply: "🎬 Mi piacciono i film con azione ed effetti speciali — e a te?"},  
  
  {keywords:["musica","song","canzone"], reply: "🎵 Dimmi un artista e ti suggerisco una canzone!"},  
  
  {keywords:["aiuto","help","assist"], reply: "Dimmi cosa ti serve e ci lavoro insieme. 😊"},  
  
  {keywords:["matematica","calcolo","calcola","calculate"], reply: "Dimmi il calcolo, ad esempio: 2 per 2 o 10 diviso 5"},  
  
  {keywords:["scherzo","joke","barzelletta"], reply: ()=>   
    `Ok, ecco: Perché il computer andò dal dottore? Perché aveva un virus! ${chooseEmoji(["😂","😅"])}`  
  },  
  
  {keywords:["buonanotte","good night"], reply: "Buonanotte! 🌙 Dormi bene."},  
  
  {keywords:["buongiorno","good morning"], reply: "Buongiorno! 🌞 Pronto per oggi?"},  
  
  {keywords:["posso","potrei","can i"], reply: "Certo, prova a chiedere e vediamo insieme!"}  
];  
  
/* -------------------------  
   Matching algorithm (fuzzy)  
   - returns best reply object or null  
   ------------------------- */  
function findBestReply(userText){  
  const inputNorm = normalizeText(userText);  
  // first: direct substring match (fast)  
  for(const r of risposte){  
    for(const kw of r.keywords){  
      if(inputNorm.includes(normalizeText(kw))) return r;  
    }  
  }  
  // second: fuzzy Levenshtein on keywords and on whole phrases  
  let best = {score:Infinity, entry:null, key:""};  
  for(const r of risposte){  
    for(const kw of r.keywords){  
      const k = normalizeText(kw);  
      // compare keyword vs input token windows  
      // compute distance between keyword and full input (shorter better)  
      const distFull = levenshtein(k, inputNorm);  
      // normalized distance: dist / avg length  
      const norm = distFull / Math.max(1, (k.length + inputNorm.length)/2);  
      if(norm < best.score){  
        best.score = norm;  
        best.entry = r;  
        best.key = kw;  
      }  
      // also compare with each word chunk of input  
      const words = inputNorm.split(/\s+/);  
      for(const w of words){  
        const d = levenshtein(k, w) / Math.max(1, (k.length + w.length)/2);  
        if(d < best.score){  
          best.score = d; best.entry = r; best.key = kw;  
        }  
      }  
    }  
  }  
  // threshold: if best.score small enough -> accept, else null  
  // 0 means perfect; choose threshold 0.45 (empirical). Lower -> stricter.  
  return (best.entry && best.score <= 0.45) ? best.entry : null;  
}  
  
/* -------------------------  
   Generate a helpful fallback reply  
   ------------------------- */  
function fallbackReply(userText){  
  // try: if looks like a question, answer generically  
  const t = userText.toLowerCase();  
  if(t.match(/\b(perché|perche|why|porque)\b/)) return "È interessante! A volte le cose sono così per diversi motivi — vuoi che provi a spiegare un motivo specifico?";  
  if(t.match(/\b(come|how|commento|come faccio)\b/)) return "Posso guidarti passo passo — dimmi esattamente cosa vuoi fare e ti aiuto.";  
  if(t.match(/\b(dove|where|dov'è|dove è)\b/)) return "Posso cercare indicazioni generali e darti consigli su come trovarlo.";  
  // default charlimit echo + suggestion  
  const short = userText.length > 80 ? userText.slice(0,78) + "..." : userText;  
  return `Mi interessa: "${short}". Posso rispondere meglio se mi dai più dettagli o mi chiedi una domanda specifica 😊`;  
}  
  
/* -------------------------  
   Main: sendMessage  
   ------------------------- */  
function appendMessage(who, text, cls){  
  const chat = document.getElementById('chat');  
  const p = document.createElement('div');  
  p.className = 'msg ' + cls;  
  p.innerHTML = text;  
  chat.appendChild(p);  
  scrollChat();  
}  
  
function tryCalculate(userText){  
  // make safe: convert words to operators then keep only allowed chars  
  const calcStr = cleanForCalc(userText);  
  if(!calcStr || calcStr.trim()==="") return null;  
  // require at least one operator to treat as calc  
  if(!/[+\-*/]/.test(calcStr)) return null;  
  try{  
    // Prevent accidental huge operations: limit length  
    if(calcStr.length > 120) return null;  
    // Use Function to evaluate safely in local scope  
    // still be cautious: only digits and operators allowed by cleanForCalc  
    const value = Function('"use strict";return ('+calcStr+')')();  
    if(typeof value === 'number' && isFinite(value)) return value;  
    return null;  
  }catch(e){ return null; }  
}  
  
function sendMessage(){  
  const inputEl = document.getElementById('inputText');  
  const userText = inputEl.value.trim();  
  if(!userText) return;  
  appendMessage('user', `<strong>Tu:</strong> ${escapeHtml(userText)}`, 'user');  
  inputEl.value = '';  
  
  // 1) try math  
  const calc = tryCalculate(userText);  
  if(calc !== null){  
    appendMessage('bot', `<strong>Bot:</strong> Il risultato è: <strong>${calc}</strong> ✅`, 'bot');  
    return;  
  }  
  
  // 2) try to find best reply  
  const match = findBestReply(userText);  
  if(match){  
    const reply = (typeof match.reply === 'function') ? match.reply(userText) : match.reply;  
    appendMessage('bot', `<strong>Bot:</strong> ${escapeHtml(String(reply))}`, 'bot');  
    return;  
  }  
  
  // 3) fallback intelligent reply (never "non ho capito")  
  const fb = fallbackReply(userText);  
  appendMessage('bot', `<strong>Bot:</strong> ${escapeHtml(fb)}`, 'bot');  
}  
  
/* -------------------------  
   small helper: escape HTML  
   ------------------------- */  
function escapeHtml(s){  
  return String(s)  
    .replace(/&/g,"&amp;")  
    .replace(/</g,"&lt;")  
    .replace(/>/g,"&gt;")  
    .replace(/\"/g,"&quot;");  
}  
  
/* -------------------------  
   Events wiring  
   ------------------------- */  
document.getElementById('startBtn').addEventListener('click', function(){  
  document.getElementById('startArea').style.display = 'none';  
  document.getElementById('inputArea').style.display = 'flex';  
  appendMessage('bot', `<strong>Bot:</strong> Ciao Omar! Sono pronto a parlare e capisco anche se scrivi un po' storto 😎`, 'bot');  
});  
document.getElementById('sendBtn').addEventListener('click', sendMessage);  
document.getElementById('inputText').addEventListener('keypress', function(e){  
  if(e.key === 'Enter') sendMessage();  
});  
  
/* -------------------------  
   OPTIONAL: preload some example messages  
   ------------------------- */  
appendMessage('bot', `<strong>Bot:</strong> Premi "Inizia Chat" per cominciare. Posso fare calcoli (es. 2 per 2), dire l'ora, aiutare con compiti e parlare molte lingue.`, 'bot');  
  
</script>  </body>  
</html>
