<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator HYBRID - Omar</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:420px;
  text-align:center;
}
input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}
button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
}
img {
  margin-top:15px;
  max-width:100%;
  border-radius:12px;
}
.loader { display:none; }
</style>
</head>
<body>
<div class="container">
  <h2>🚀 AI Generator HYBRID</h2>
  <p>Creato da Omar</p>
  <input type="password" id="apiKey" placeholder="Chiave OpenAI (opzionale)">
  <textarea id="prompt" placeholder="Scrivi cosa vuoi creare"></textarea><button onclick="generateImage()">🎨 Genera</button>

  <div class="loader" id="loader">⏳ Generazione...</div>
  <img id="result" />
</div><script>
async function generateImage() {
  const apiKey = document.getElementById('apiKey').value;
  const prompt = document.getElementById('prompt').value;

  if (!prompt) {
    alert('Scrivi qualcosa');
    return;
  }

  document.getElementById('loader').style.display = 'block';

  // 🔥 TRY OPENAI
  if (apiKey) {
    try {
      const res = await fetch('https://api.openai.com/v1/images/generations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: 'gpt-image-1',
          prompt: prompt,
          size: '1024x1024'
        })
      });

      const data = await res.json();

      if (data.data && data.data[0]) {
        document.getElementById('result').src = data.data[0].url;
        document.getElementById('loader').style.display = 'none';
        return;
      }

    } catch (e) {
      console.log('OpenAI fallito, passo a gratis');
    }
  }

  // 🆓 FALLBACK GRATIS (Pollinations AI - no key)
  try {
    const freeUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
    document.getElementById('result').src = freeUrl;
  } catch (e) {
    alert('Errore totale');
  }

  document.getElementById('loader').style.display = 'none';
}
</script></body>
</html>
