<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROQ AI — Neural Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES & RESET
    ═══════════════════════════════════════ */
    :root {
      --bg-deep:       #050810;
      --bg-panel:      #0b0f1e;
      --bg-card:       #0f1628;
      --bg-input:      #131929;
      --border:        #1e2a45;
      --border-glow:   #2a3d6e;
      --accent:        #00e5ff;
      --accent-dim:    #0099bb;
      --accent-glow:   rgba(0, 229, 255, 0.15);
      --accent2:       #7c5cfc;
      --accent2-glow:  rgba(124, 92, 252, 0.15);
      --user-bg:       #1a1040;
      --user-border:   #7c5cfc;
      --ai-bg:         #091828;
      --ai-border:     #00e5ff;
      --text-primary:  #e8eaf6;
      --text-secondary:#7b8db0;
      --text-muted:    #3d4f72;
      --danger:        #ff3d71;
      --success:       #00e096;
      --font-mono:     'Space Mono', monospace;
      --font-display:  'Syne', sans-serif;
      --radius:        12px;
      --radius-sm:     8px;
      --transition:    0.2s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-display);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       BACKGROUND EFFECTS
    ═══════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,229,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,92,252,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════ */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,15,30,0.85);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
      animation: pulse-logo 3s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%,100% { box-shadow: 0 0 20px rgba(0,229,255,0.3); }
      50%      { box-shadow: 0 0 35px rgba(0,229,255,0.55); }
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* Status pill */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      transition: var(--transition);
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: var(--transition);
    }

    #status-pill.online #status-dot {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* Icon buttons */
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: var(--transition);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .icon-btn.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,61,113,0.1);
    }

    /* ═══════════════════════════════════════
       API KEY OVERLAY
    ═══════════════════════════════════════ */
    #api-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(5,8,16,0.95);
      backdrop-filter: blur(20px);
      padding: 20px;
    }

    #api-overlay.hidden { display: none; }

    .api-card {
      width: 100%;
      max-width: 440px;
      border-radius: 20px;
      border: 1px solid var(--border-glow);
      background: var(--bg-card);
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,229,255,0.06), 0 0 40px rgba(124,92,252,0.08);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .api-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(0,229,255,0.25);
    }

    .api-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .api-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    .api-desc a {
      color: var(--accent);
      text-decoration: none;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border-glow);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      letter-spacing: 0.08em;
      transition: var(--transition);
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      padding: 4px;
      transition: var(--transition);
    }

    .eye-btn:hover { color: var(--accent); }

    #save-key-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    #save-key-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: var(--transition);
    }

    #save-key-btn:hover::after { background: rgba(255,255,255,0.1); }
    #save-key-btn:active { transform: scale(0.98); }

    .api-error {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255,61,113,0.1);
      border: 1px solid rgba(255,61,113,0.3);
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 11px;
      display: none;
    }

    /* ═══════════════════════════════════════
       MESSAGES AREA
    ═══════════════════════════════════════ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border-glow);
      border-radius: 4px;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
      animation: fade-in 0.6s ease;
    }

    .empty-icon {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    }

    .empty-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .empty-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 300px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 8px 14px;
      border-radius: 100px;
      border: 1px solid var(--border-glow);
      background: rgba(255,255,255,0.02);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* Message bubble */
    .msg {
      display: flex;
      gap: 12px;
      animation: msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 100%;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .msg.user .msg-avatar {
      background: linear-gradient(135deg, var(--accent2), #5a3fc0);
      box-shadow: 0 0 16px rgba(124,92,252,0.35);
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, var(--accent-dim), #006080);
      box-shadow: 0 0 16px rgba(0,229,255,0.25);
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .msg.user .msg-meta { justify-content: flex-end; }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 14px;
      word-break: break-word;
      white-space: pre-wrap;
      max-width: 680px;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-top-right-radius: 4px;
      margin-left: auto;
      box-shadow: 0 0 20px rgba(124,92,252,0.1);
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-top-left-radius: 4px;
      box-shadow: 0 0 20px rgba(0,229,255,0.08);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: 16px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-6px); opacity: 1; }
    }

    /* Error msg */
    .msg-error {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: rgba(255,61,113,0.08);
      border: 1px solid rgba(255,61,113,0.25);
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* ═══════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════ */
    #input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(11,15,30,0.9);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    #input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      transition: var(--transition);
    }

    #input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      padding: 6px 0;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #input-actions {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      padding-bottom: 4px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    #mic-btn.active {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,61,113,0.15);
      animation: mic-pulse 1s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,61,113,0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(255,61,113,0); }
    }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: var(--transition);
      box-shadow: 0 0 16px rgba(0,229,255,0.2);
    }

    #send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 24px rgba(0,229,255,0.4);
    }

    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Char counter */
    #char-counter {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 6px;
      padding: 0 4px;
    }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      padding: 10px 20px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════ */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      #header { padding: 14px 16px; }
      #messages { padding: 16px 12px; }
      #input-area { padding: 12px 12px 16px; }
      .api-card { padding: 30px 22px; }
    }
  </style>
</head>
<body>

<!-- ╔══════════════════════════════════╗
     ║  API KEY OVERLAY                 ║
     ╚══════════════════════════════════╝ -->
<div id="api-overlay">
  <div class="api-card">
    <div class="api-icon">⚡</div>
    <div class="api-title">GROQ NEURAL CHAT</div>
    <div class="api-desc">
      Inserisci la tua API Key per iniziare.<br>
      Ottienila su <a href="https://console.groq.com" target="_blank">console.groq.com</a>
    </div>
    <div class="input-group">
      <input id="api-key-input" type="password" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
      <button class="eye-btn" id="toggle-eye" title="Mostra/Nascondi">👁</button>
    </div>
    <button id="save-key-btn">INIZIA LA CHAT →</button>
    <div class="api-error" id="api-error">⚠ Inserisci una API Key valida (inizia con "gsk_")</div>
  </div>
</div>

<!-- ╔══════════════════════════════════╗
     ║  MAIN APP                        ║
     ╚══════════════════════════════════╝ -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">GROQ AI</div>
        <div class="logo-sub">Neural Chat · llama3-70b</div>
      </div>
    </div>
    <div class="header-actions">
      <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">OFFLINE</span>
      </div>
      <button class="icon-btn" id="settings-btn" title="Cambia API Key">🔑</button>
      <button class="icon-btn danger" id="clear-btn" title="Cancella chat">🗑</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
