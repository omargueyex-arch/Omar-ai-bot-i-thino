<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Mono:wght@300;400&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1c1e26;
    --border: rgba(255,255,255,0.06);
    --border-glow: rgba(255,200,100,0.18);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --gold-glow: rgba(245,200,66,0.35);
    --text: #e8e4da;
    --text-dim: rgba(232,228,218,0.45);
    --text-mid: rgba(232,228,218,0.72);
    --user-bubble: #1e2130;
    --ai-bubble: #161820;
    --red: #ff6b6b;
    --green: #6bffc8;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(245,200,66,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 85% 100%, rgba(100,140,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,12,15,0.85);
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: #0b0c0f;
    font-weight: 500;
    box-shadow: 0 0 20px var(--gold-glow);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span {
    color: var(--gold);
    font-style: italic;
  }

  /* Model selector */
  .model-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 14px 6px 10px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .model-selector:hover {
    border-color: var(--border-glow);
    box-shadow: 0 0 12px rgba(245,200,66,0.1);
  }

  .model-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .model-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
    white-space: nowrap;
    user-select: none;
  }

  .model-chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .model-selector.open .model-chevron { transform: rotate(180deg); }

  .model-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    min-width: 240px;
    z-index: 100;
    opacity: 0;
    transform: translateY(-8px) scale(0.97);
    pointer-events: none;
    transition: all 0.18s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .model-dropdown.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .model-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .model-option:hover { background: var(--surface2); }
  .model-option.active { background: var(--gold-dim); }

  .model-option-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .model-option-info { flex: 1; }
  .model-option-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 400;
  }
  .model-option-desc {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .model-check {
    font-size: 12px;
    color: var(--gold);
    opacity: 0;
  }
  .model-option.active .model-check { opacity: 1; }

  /* CHAT AREA */
  .chat-wrap {
    flex: 1;
    overflow-y: auto;
    position: relative;
    z-index: 1;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  .chat-wrap::-webkit-scrollbar { width: 4px; }
  .chat-wrap::-webkit-scrollbar-track { background: transparent; }
  .chat-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .messages {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    text-align: center;
    padding: 40px 20px;
    gap: 24px;
  }

  .empty-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: var(--gold-dim);
    border: 1px solid var(--border-glow);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 36px;
    color: var(--gold);
    box-shadow: 0 0 40px rgba(245,200,66,0.12);
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .empty-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .empty-title em {
    font-style: italic;
    color: var(--gold);
  }

  .empty-sub {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 340px;
    line-height: 1.7;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
  }

  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .suggestion-chip:hover {
    border-color: var(--border-glow);
    color: var(--gold);
    background: var(--gold-dim);
  }

  /* MESSAGES */
  .message {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    margin-top: 2px;
  }

  .avatar.ai {
    background: var(--gold-dim);
    border: 1px solid var(--border-glow);
    color: var(--gold);
    font-family: 'Fraunces', serif;
    font-weight: 500;
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
  }

  .bubble {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: 14.5px;
    position: relative;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: var(--text);
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }

  .bubble code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--gold);
  }

  .bubble pre {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .msg-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    padding: 0 4px;
  }

  .message.user .msg-meta { text-align: right; }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px 20px;
    background: rgba(11,12,15,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px 12px 12px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--border-glow);
    box-shadow: 0 0 20px rgba(245,200,66,0.08);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    min-height: 24px;
    overflow-y: auto;
    caret-color: var(--gold);
  }

  textarea::placeholder { color: var(--text-dim); }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .icon-btn:hover {
    background: var(--gold-dim);
    color: var(--gold);
  }

  .icon-btn.recording {
    background: rgba(255,107,107,0.15);
    color: var(--red);
    animation: recordPulse 1s infinite;
    border: 1px solid rgba(255,107,107,0.3);
  }

  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); }
  }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    border: none;
    background: var(--gold);
    color: #0b0c0f;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.18s;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--gold-glow);
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 24px var(--gold-glow);
  }

  .send-btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
    box-shadow: none;
  }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 0 4px;
  }

  .input-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Voice status bar */
  .voice-bar {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0; right: 0;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .voice-bar.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .voice-waves {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 20px;
  }

  .voice-wave {
    width: 3px;
    background: var(--red);
    border-radius: 2px;
    animation: waveAnim 0.8s infinite;
  }

  .voice-wave:nth-child(1) { animation-delay: 0s; height: 8px; }
  .voice-wave:nth-child(2) { animation-delay: 0.1s; height: 14px; }
  .voice-wave:nth-child(3) { animation-delay: 0.2s; height: 20px; }
  .voice-wave:nth-child(4) { animation-delay: 0.3s; height: 14px; }
  .voice-wave:nth-child(5) { animation-delay: 0.4s; height: 8px; }

  @keyframes waveAnim {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  .voice-label {
    font-size: 12px;
    color: var(--red);
    flex: 1;
  }

  .voice-stop {
    font-size: 11px;
    color: var(--red);
    background: rgba(255,107,107,0.15);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .voice-stop:hover { background: rgba(255,107,107,0.25); }

  /* Error / status toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text-mid);
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: rgba(255,107,107,0.3); color: var(--red); }

  /* System prompt panel */
  .sys-panel {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .sys-panel.open { opacity: 1; pointer-events: all; }

  .sys-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
  }

  .sys-drawer {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 760px;
    transform: translateY(20px);
    transition: transform 0.25s;
  }

  .sys-panel.open .sys-drawer { transform: translateY(0); }

  .sys-drawer h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 18px;
    margin-bottom: 14px;
    color: var(--text);
  }

  .sys-drawer textarea {
    width: 100%;
    height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-mid);
    resize: none;
    max-height: unset;
    min-height: unset;
  }

  .sys-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: flex-end;
  }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: var(--border-glow); color: var(--text); }

  .btn-gold {
    background: var(--gold);
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    color: #0b0c0f;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }

  .btn-gold:hover { opacity: 0.88; }

  /* Clear button */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 5px 12px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    transition: all 0.15s;
  }

  .clear-btn:hover { border-color: rgba(255,107,107,0.3); color: var(--red); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-text">Claude <span>Chat</span></div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;">
    <button class="clear-btn" onclick="clearChat()">✕ Nuova chat</button>
    <div class="model-selector" id="modelSelector" onclick="toggleModelDropdown()">
      <div class="model-dot"></div>
      <span class="model-name" id="modelLabel">claude-sonnet-4-20250514</span>
      <span class="model-chevron">▾</span>
      <div class="model-dropdown" id="modelDropdown">
        <div class="model-option active" onclick="selectModel('claude-opus-4-20250514','Opus 4','🏆',event)">
          <div class="model-option-icon" style="background:rgba(180,130,255,0.1);color:#b482ff;">🏆</div>
          <div class="model-option-info">
            <div class="model-option-label">claude-opus-4-20250514</div>
            <div class="model-option-desc">Il più potente · Ragionamento avanzato</div>
          </div>
          <span class="model-check">✓</span>
        </div>
        <div class="model-option" onclick="selectModel('claude-sonnet-4-20250514','Sonnet 4','⚡',event)">
          <div class="model-option-icon" style="background:rgba(245,200,66,0.1);color:var(--gold);">⚡</div>
          <div class="model-option-info">
            <div class="model-option-label">claude-sonnet-4-20250514</div>
            <div class="model-option-desc">Bilanciato · Veloce e intelligente</div>
          </div>
          <span class="model-check">✓</span>
        </div>
        <div class="model-option" onclick="selectModel('claude-haiku-4-5-20251001','Haiku 4.5','💨',event)">
          <div class="model-option-icon" style="background:rgba(107,255,200,0.1);color:var(--green);">💨</div>
          <div class="model-option-info">
            <div class="model-option-label">claude-haiku-4-5-20251001</div>
            <div class="model-option-desc">Ultrarapido · Risposte istantanee</div>
          </div>
          <span class="model-check">✓</span>
        </div>
      </div>
