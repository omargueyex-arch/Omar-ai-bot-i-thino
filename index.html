<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loretta AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdf6ee;
      --surface: #fff9f2;
      --border: #e8d5bc;
      --accent: #c0392b;
      --accent2: #8B4513;
      --text: #2c1a0e;
      --muted: #a08060;
      --bot-bubble: #fff3e8;
      --user-bubble: #2c1a0e;
      --user-text: #fdf6ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 10% 90%, rgba(192,57,43,0.06) 0%, transparent 50%),
        radial-gradient(circle at 90% 10%, rgba(139,69,19,0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 620px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 16px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 4px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c0392b, #8B4513);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 16px rgba(192,57,43,0.25);
      flex-shrink: 0;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 4px 16px rgba(192,57,43,0.25); }
      50% { box-shadow: 0 4px 24px rgba(192,57,43,0.45); }
    }

    .header-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header-info p {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #27ae60;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-box::-webkit-scrollbar { width: 3px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { align-items: flex-end; }
    .msg-row.bot  { align-items: flex-start; }

    .msg-label {
      font-size: 0.58rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .bubble {
      max-width: 78%;
      padding: 13px 18px;
      font-size: 0.83rem;
      line-height: 1.65;
      border-radius: 2px;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bubble);
      color: var(--user-text);
      border-right: 3px solid var(--accent);
    }

    /* Typing indicator */
    .typing-bubble {
      background: var(--bot-bubble);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 16px 20px;
      border-radius: 2px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding-top: 14px;
      border-top: 1.5px solid var(--border);
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent2); }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 2px;
      padding: 12px 20px;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    button:hover { background: var(--accent); }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-bubble {
      background: #fff0f0;
      border: 1.5px solid #ffcccc;
      border-left: 3px solid #c0392b;
      color: #8B0000;
      padding: 13px 18px;
      font-size: 0.78rem;
      border-radius: 2px;
      max-width: 78%;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">💁‍♀️</div>
    <div class="header-info">
      <h1>Loretta</h1>
      <p>Assistente AI · Powered by Claude</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg-row bot">
      <div class="msg-label">Loretta</div>
      <div class="bubble bot">Ciao! Sono Loretta, la tua assistente personale. Dimmi tutto, tesoro — sono qui per te! 💅</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Scrivi qualcosa a Loretta..." />
    <button id="sendBtn" onclick="sendMessage()">Invia</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  const SYSTEM_PROMPT = `Sei Loretta, un'assistente AI italiana con una personalità vivace, simpatica e un po' teatrale. 
Parli sempre in italiano con un tono caldo, diretto e a volte sarcastico ma sempre affettuoso.
Usi espressioni tipiche italiane, dimostrativi affettuosi come "tesoro", "caro/a", "amore".
Sei intelligente, pratica, e non hai peli sulla lingua — dici le cose come stanno, con stile.
Sei molto espressiva, usi emoji con parsimonia ma con gusto.
Le tue risposte sono concise ma piene di carattere. Mai noiosa, mai generica.
Ricordati: sei LORETTA, non un generico assistente AI. Hai una personalità precisa e riconoscibile.`;

  const conversationHistory = [];

  function addMessage(text, type) {
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = type === 'bot' ? 'Loretta' : 'Tu';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${type}`;
    bubble.textContent = text;

    row.appendChild(label);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typingRow';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Loretta';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(label);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // Show user message
    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;

    // Show typing
    addTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0] && data.content[0].text) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage(reply, 'bot');
      } else {
        // Show error gracefully in Loretta's style
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = 'Loretta';
        const errBubble = document.createElement('div');
        errBubble.className = 'error-bubble';
        errBubble.textContent = 'Oddio, ho avuto un momento di pausa mentale! Riprova, su. 😅';
        row.appendChild(label);
        row.appendChild(errBubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    } catch (err) {
      removeTyping();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'Loretta';
      const errBubble = document.createElement('div');
      errBubble.className = 'error-bubble';
      errBubble.textContent = 'Connessione assente, tesoro! Controlla internet e riprova. 📡';
      row.appendChild(label);
      row.appendChild(errBubble);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.disabled = false;
    input.focus();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
  });
</script>
</body>
</html>
