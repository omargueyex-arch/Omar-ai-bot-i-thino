<!DOCTYPE html><html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #00c6ff;
  align-self: flex-end;
}

.bot {
  background: #444;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: rgba(0,0,0,0.3);
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
  font-size: 18px;
}

#sendBtn { background: #00c6ff; }
#micBtn { background: #ff5f6d; }

  </style>
</head>
<body><header>🤖 AI Chat Pro</header><div id="chat"></div><div id="inputArea">
  <input type="text" id="input" placeholder="Scrivi o usa il microfono...">
  <button id="sendBtn">➤</button>
  <button id="micBtn">🎤</button>
</div><script>
const API_KEY = "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";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("...", "bot");

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  chat.lastChild.remove();

  addMessage(data.choices[0].message.content, "bot");
}

// Pulsante invio
sendBtn.onclick = sendMessage;

// Invio con Enter
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// Microfono
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "it-IT";

micBtn.onclick = () => {
  recognition.start();
};

recognition.onresult = (event) => {
  input.value = event.results[0][0].transcript;
};

</script></body>
</html>
