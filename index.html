<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NeuralChat AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#0d0d14;color:#e8e8f0;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* MODAL */
#modal{position:fixed;inset:0;background:#000000dd;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.mbox{background:#1a1a2e;border:1px solid #ffffff15;border-radius:20px;padding:28px 22px;width:100%;max-width:360px;}
.mbox h2{font-size:1.3rem;font-weight:700;margin-bottom:6px;}
.mbox p{font-size:0.8rem;color:#8888aa;margin-bottom:20px;line-height:1.5;}
.mbox label{font-size:0.75rem;color:#8888aa;display:block;margin-bottom:6px;}
.mbox input{width:100%;background:#0d0d14;border:1.5px solid #ffffff20;border-radius:10px;padding:12px 14px;color:#e8e8f0;font-size:0.85rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;}
.mbox input:focus{border-color:#6c63ff88;}
#startBtn{width:100%;padding:13px;background:linear-gradient(135deg,#6c63ff,#ff6584);border:none;border-radius:10px;color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.mnote{font-size:0.7rem;color:#666688;margin-top:12px;text-align:center;line-height:1.5;}
.mnote a{color:#6c63ff;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* SIDEBAR */
#ov{display:none;position:fixed;inset:0;background:#00000088;z-index:50;}
#ov.on{display:block;}
#sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:#111120;border-right:1px solid #ffffff10;z-index:51;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column;}
#sb.on{transform:translateX(0);}
.sbh{padding:18px 14px 12px;}
.sblogo{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sbd{width:9px;height:9px;border-radius:50%;background:#6c63ff;box-shadow:0 0 10px #6c63ff;}
#newBtn{width:100%;padding:10px;background:linear-gradient(135deg,#6c63ff,#ff6584);border:none;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;}
.sbl{flex:1;overflow-y:auto;padding:8px;}
.sbll{font-size:0.68rem;color:#555577;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px 4px;}
.ci{padding:9px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.ci.on{background:#6c63ff22;border:1px solid #6c63ff44;}
.ci span{font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.cdel{background:none;border:none;color:#ff6584;font-size:0.8rem;cursor:pointer;padding:2px 6px;border-radius:5px;}
.sbf{padding:12px 14px;border-top:1px solid #ffffff10;font-size:0.68rem;color:#555577;text-align:center;}

/* TOPBAR */
#tb{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #ffffff10;background:#0d0d14;flex-shrink:0;}
#mbtn{background:none;border:none;color:#e8e8f0;font-size:1.3rem;cursor:pointer;padding:4px 8px;line-height:1;}
#ctitle{font-weight:600;font-size:0.95rem;flex:1;}
.badge{font-size:0.68rem;background:#6c63ff22;color:#6c63ff;border:1px solid #6c63ff44;padding:3px 9px;border-radius:20px;}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;}
#es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#555577;text-align:center;padding:20px;}
#es .ei{font-size:2.5rem;}
#es h3{color:#e8e8f0;font-size:1rem;}
#es p{font-size:0.78rem;line-height:1.5;max-width:240px;}

.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.u{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;}
.av.ai{background:linear-gradient(135deg,#6c63ff,#9b59b6);}
.av.u{background:linear-gradient(135deg,#43e97b,#2ecc71);color:#000;}
.mb{max-width:75%;display:flex;flex-direction:column;gap:3px;}
.msg.u .mb{align-items:flex-end;}
.bub{padding:10px 13px;border-radius:16px;font-size:0.83rem;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
.msg.ai .bub{background:#1a1a2e;border:1px solid #ffffff10;border-bottom-left-radius:4px;}
.msg.u .bub{background:#6c63ff33;border:1px solid #6c63ff44;border-bottom-right-radius:4px;}
.mt{font-size:0.63rem;color:#555577;padding:0 4px;}

.typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:#1a1a2e;border:1px solid #ffffff10;border-radius:16px;border-bottom-left-radius:4px;}
.td{width:6px;height:6px;border-radius:50%;background:#6c63ff;animation:tb 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* INPUT */
#ia{padding:10px 12px 16px;border-top:1px solid #ffffff10;background:#0d0d14;flex-shrink:0;}
#ir{display:flex;align-items:flex-end;gap:8px;background:#1a1a2e;border:1.5px solid #ffffff15;border-radius:14px;padding:8px 8px 8px 13px;}
#ir:focus-within{border-color:#6c63ff66;}
#ib{flex:1;background:none;border:none;outline:none;color:#e8e8f0;font-family:'Inter',sans-serif;font-size:0.85rem;resize:none;max-height:100px;min-height:22px;line-height:1.5;}
#ib::placeholder{color:#555577;}
.ibtn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
#vbtn{background:#252540;color:#e8e8f0;}
#vbtn.rec{background:#ff658433;color:#ff6584;border:1px solid #ff658466;}
#sbtn{background:linear-gradient(135deg,#6c63ff,#ff6584);color:#fff;}
#sbtn:disabled{opacity:.35;}
#rb{display:none;align-items:center;gap:8px;padding:6px 12px;background:#ff658411;border:1px solid #ff658433;border-radius:8px;margin-bottom:8px;font-size:0.75rem;color:#ff6584;}
#rb.on{display:flex;}
.rdot{width:7px;height:7px;background:#ff6584;border-radius:50%;animation:rp 1s ease-in-out infinite;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:.3;}}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#ff4466ee;color:#fff;padding:8px 18px;border-radius:30px;font-size:0.78rem;opacity:0;transition:all .25s;z-index:998;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="modal">
  <div class="mbox">
    <h2>⬡ NeuralChat AI</h2>
    <p>Inserisci la tua chiave API Anthropic per usare Claude.</p>
    <label>API KEY</label>
    <input id="ki" type="text" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    <button id="startBtn">Inizia a chattare →</button>
    <div class="mnote">
      Chiave salvata solo nel browser.<br>
      <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
  </div>
</div>

<div id="app">
  <div id="ov"></div>
  <div id="sb">
    <div class="sbh">
      <div class="sblogo"><div class="sbd"></div>NeuralChat</div>
      <button id="newBtn">＋ Nuova Chat</button>
    </div>
    <div class="sbl">
      <div class="sbll">Conversazioni</div>
      <div id="cl"></div>
    </div>
    <div class="sbf">Claude Sonnet 4</div>
  </div>

  <div id="tb">
    <button id="mbtn">☰</button>
    <div id="ctitle">Nuova Chat</div>
    <div class="badge">Claude Sonnet 4</div>
  </div>

  <div id="msgs">
    <div id="es">
      <div class="ei">🤖</div>
      <h3>Ciao! Sono Claude.</h3>
      <p>Scrivi un messaggio o usa il microfono per iniziare.</p>
    </div>
  </div>

  <div id="ia">
    <div id="rb"><div class="rdot"></div><span>Registrazione...</span><span id="rt">0:00</span></div>
    <div id="ir">
      <textarea id="ib" rows="1" placeholder="Scrivi un messaggio..."></textarea>
      <button class="ibtn" id="vbtn">🎤</button>
      <button class="ibtn" id="sbtn">➤</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var KEY='',chats=[],aid=null,busy=false,rec=null,rchunks=[],rsec=0,rtick=null,isrec=false;

function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lss(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tstr(){return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}
function gc(){return chats.find(function(c){return c.id===aid;});}
function sv(){lss('nc_ch',JSON.stringify(chats));}

/* ── INIT ── */
KEY=ls('nc_k')||'';
try{chats=JSON.parse(ls('nc_ch')||'[]');}catch(e){chats=[];}
if(KEY)document.getElementById('modal').style.display='none';
if(!chats.length)newChat(false);else{renderList();loadChat(chats[0].id);}

document.getElementById('startBtn').onclick=saveKey;
document.getElementById('ki').onkeydown=function(e){if(e.key==='Enter')saveKey();};
document.getElementById('mbtn').onclick=openSb;
document.getElementById('ov').onclick=closeSb;
document.getElementById('newBtn').onclick=function(){newChat(true);closeSb();};
document.getElementById('sbtn').onclick=send;
document.getElementById('vbtn').onclick=togRec;
document.getElementById('ib').onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
document.getElementById('ib').oninput=resz;

/* ── KEY ── */
function saveKey(){
  var v=document.getElementById('ki').value.replace(/\s/g,'');
  if(v.length<8){toast('Chiave troppo corta');return;}
  KEY=v;lss('nc_k',KEY);
  document.getElementById('modal').style.display='none';
}

/* ── CHATS ── */
function newChat(load){
  var c={id:uid(),name:'Nuova Chat',msgs:[]};
  chats.unshift(c);sv();renderList();
  if(load!==false)loadChat(c.id);
}
function loadChat(id){
  aid=id;var c=gc();if(!c)return;
  document.getElementById('ctitle').textContent=c.name;
  renderMsgs(c.msgs);renderList();
}
function delChat(id,e){
  e.stopPropagation();
  chats=chats.filter(function(c){return c.id!==id;});sv();
  if(aid===id){if(!chats.length)newChat(true);else loadChat(chats[0].id);}
  else renderList();
}
function nameChat(txt){
  var c=gc();
  if(c&&c.name==='Nuova Chat'){
    c.name=txt.slice(0,30)+(txt.length>30?'…':'');
    document.getElementById('ctitle').textContent=c.name;
    sv();renderList();
  }
}

/* ── RENDER LIST ── */
function renderList(){
  var el=document.getElementById('cl');el.innerHTML='';
  chats.forEach(function(c){
    var d=document.createElement('div');
    d.className='ci'+(c.id===aid?' on':'');
    d.innerHTML='<span>💬 '+esc(c.name)+'</span><button class="cdel">✕</button>';
    d.onclick=function(){loadChat(c.id);closeSb();};
    d.querySelector('.cdel').onclick=function(e){delChat(c.id,e);};
    el.appendChild(d);
  });
}

/* ── RENDER MSGS ── */
function renderMsgs(msgs){
  var w=document.getElementById('msgs'),es=document.getElementById('es');
  w.innerHTML='';
  if(!msgs.length){w.appendChild(es);return;}
  msgs.forEach(function(m){w.appendChild(mkbub(m));});
  w.scrollTop=w.scrollHeight;
}
function mkbub(m){
  var row=document.createElement('div');
  row.className='msg '+(m.r==='ai'?'ai':'u');
  var av=document.createElement('div');
  av.className='av '+(m.r==='ai'?'ai':'u');
  av.textContent=m.r==='ai'?'⬡':'◉';
  var mb=document.createElement('div');mb.className='mb';
  var bub=document.createElement('div');bub.className='bub';bub.textContent=m.t;
  var mt=document.createElement('div');mt.className='mt';mt.textContent=m.ts;
  mb.appendChild(bub);mb.appendChild(mt);
  row.appendChild(av);row.appendChild(mb);
  return row;
}
function push(m){
  var c=gc();
  if(c){c.msgs.push(m);sv();}
  var w=document.getElementById('msgs'),es=document.getElementById('es');
  if(es&&es.parentNode)es.parentNode.removeChild(es);
  var el=mkbub(m);
  w.appendChild(el);
  w.scrollTop=w.scrollHeight;
}
function showTyp(){
  var w=document.getElementById('msgs'),el=document.createElement('div');
  el.className='msg ai';el.id='typ';
  el.innerHTML='<div class="av ai">⬡</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  w.appendChild(el);w.scrollTop=w.scrollHeight;
}
function hideTyp(){var e=document.getElementById('typ');if(e)e.remove();}

/* ── SEND ── */
function send(){
  if(busy)return;
  var b=document.getElementById('ib'),txt=b.value.trim();
  if(!txt)return;
  if(!KEY){document.getElementById('modal').style.display='flex';return;}
  nameChat(txt);
  push({r:'user',t:txt,ts:tstr()});
  b.value='';resz();
  callAI(txt);
}

async function callAI(txt){
  busy=true;document.getElementById('sbtn').disabled=true;showTyp();
  var c=gc();
  var hist=(c?c.msgs:[]).slice(-20).map(function(m){return{role:m.r==='ai'?'assistant':'user',content:m.t};});
  var body=JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:'Sei un assistente AI utile e amichevole. Rispondi in italiano quando l\'utente scrive in italiano.',messages:hist});
  var hdrs={'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  var reply=null,err=null;

  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:hdrs,body:body});
    if(r.ok){
      var d=await r.json();
      reply=d.content&&d.content[0]?d.content[0].text:null;
    } else {
      var ej=await r.json().catch(function(){return{};});
      if(r.status===401)err='❌ Chiave API non valida (401). Ricontrolla la chiave.';
      else if(r.status===429)err='⏳ Troppe richieste (429). Riprova tra qualche secondo.';
      else err='❌ Errore HTTP '+r.status+': '+(ej.error&&ej.error.message||'nessun dettaglio');
    }
  } catch(fe){
    // Tentativo con proxy CORS
    try{
      var url2='https://corsproxy.io/?'+encodeURIComponent('https://api.anthropic.com/v1/messages');
      var r2=await fetch(url2,{method:'POST',headers:hdrs,body:body});
      if(r2.ok){
        var d2=await r2.json();
        reply=d2.content&&d2.content[0]?d2.content[0].text:null;
      } else {
        var ej2=await r2.json().catch(function(){return{};});
        err='❌ Proxy errore '+r2.status+': '+(ej2.error&&ej2.error.message||'');
      }
    } catch(fe2){
      err='❌ Connessione fallita: '+fe2.message+'\nVerifica la connessione internet.';
    }
  }

  try{ hideTyp(); } catch(e){}
  try{
    push({r:'ai',t:reply||err||'❌ Risposta vuota',ts:tstr()});
  } catch(pe){
    // fallback diretto nel DOM
    var w=document.getElementById('msgs');
    var div=document.createElement('div');
    div.className='msg ai';
    div.innerHTML='<div class="av ai">⬡</div><div class="mb"><div class="bub">'+(reply||err||'Errore')+'</div></div>';
    w.appendChild(div);
    w.scrollTop=w.scrollHeight;
  }
  busy=false;
  try{document.getElementById('sbtn').disabled=false;}catch(e){}
}

/* ── RESIZE TEXTAREA ── */
function resz(){
  var b=document.getElementById('ib');
  b.style.height='auto';
  b.style.height=Math.min(b.scrollHeight,100)+'px';
}

/* ── SIDEBAR ── */
function openSb(){document.getElementById('sb').classList.add('on');document.getElementById('ov').classList.add('on');}
function closeSb(){document.getElementById('sb').classList.remove('on');document.getElementById('ov').classList.remove('on');}

/* ── VOICE ── */
async function togRec(){if(isrec)stopRec();else await startRec();}
async function startRec(){
  if(!KEY){document.getElementById('modal').style.display='flex';return;}
  try{
    var st=await navigator.mediaDevices.getUserMedia({audio:true});
    rchunks=[];rec=new MediaRecorder(st);
    rec.ondataavailable=function(e){rchunks.push(e.data);};
    rec.onstop=onStop;rec.start();
    isrec=true;rsec=0;
    document.getElementById('vbtn').classList.add('rec');
    document.getElementById('vbtn').textContent='⏹';
    document.getElementById('rb').classList.add('on');
    rtick=setInterval(function(){rsec++;var m=Math.floor(rsec/60),s=rsec%60;document.getElementById('rt').textContent=m+':'+(s<10?'0':'')+s;if(rsec>=120)stopRec();},1000);
  }catch(e){toast('Microfono non disponibile');}
}
function stopRec(){
  if(!rec)return;rec.stop();rec.stream.getTracks().forEach(function(t){t.stop();});
  clearInterval(rtick);isrec=false;
  document.getElementById('vbtn').classList.remove('rec');
  document.getElementById('vbtn').textContent='🎤';
  document.getElementById('rb').classList.remove('on');
}
function onStop(){
  var m=Math.floor(rsec/60),s=rsec%60;
  push({r:'user',t:'🎤 Messaggio vocale ('+m+':'+(s<10?'0':'')+s+')',ts:tstr()});
  push({r:'ai',t:'Ho ricevuto il tuo messaggio vocale 🎤\nNon posso ascoltarlo direttamente, scrivi quello che hai detto e ti rispondo!',ts:tstr()});
}

/* ── TOAST ── */
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},3000);
}
</script>
</body>
</html>
