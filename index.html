<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROQ :: NEURAL INTERFACE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep: #000d1a;
    --blue-mid: #001a33;
    --blue-bright: #0066ff;
    --blue-glow: #00aaff;
    --cyan: #00eeff;
    --white: #e0f4ff;
    --grid: rgba(0, 102, 255, 0.08);
  }

  body {
    background: var(--blue-deep);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 30, 0.15) 2px,
      rgba(0, 0, 30, 0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
    animation: scanMove 8s linear infinite;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 40px; }
  }

  .container {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0;
    border-bottom: 1px solid rgba(0, 170, 255, 0.3);
    position: relative;
  }

  .header::before {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 1px;
    background: var(--cyan);
    box-shadow: 0 0 20px var(--cyan);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,238,255,0.4);
    animation: flicker 6s infinite;
  }

  .tagline {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: rgba(0, 170, 255, 0.6);
    margin-top: 6px;
    text-transform: uppercase;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.85; }
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: rgba(0, 170, 255, 0.5);
    letter-spacing: 0.15em;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff3333;
    margin-right: 6px;
    animation: blink 1s infinite;
  }
  .status-dot.active { background: var(--cyan); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Panel */
  .panel {
    background: rgba(0, 20, 50, 0.6);
    border: 1px solid rgba(0, 102, 255, 0.25);
    border-radius: 2px;
    padding: 20px;
    position: relative;
    backdrop-filter: blur(10px);
  }

  .panel::before {
    content: attr(data-label);
    position: absolute;
    top: -1px;
    left: 20px;
    background: var(--blue-deep);
    padding: 0 10px;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--blue-glow);
    text-transform: uppercase;
    transform: translateY(-50%);
  }

  .panel-corner {
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: var(--cyan);
    border-style: solid;
  }
  .panel-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .panel-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .panel-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* Key input */
  .key-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(0,170,255,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"], input[type="password"] {
    background: rgba(0,20,60,0.8);
    border: 1px solid rgba(0,102,255,0.3);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    letter-spacing: 0.1em;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(0,238,255,0.2), inset 0 0 10px rgba(0,238,255,0.05);
  }

  .toggle-key {
    background: none;
    border: 1px solid rgba(0,102,255,0.3);
    color: rgba(0,170,255,0.5);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    padding: 10px 12px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.15em;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .toggle-key:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Chat area */
  #chat-log {
    min-height: 300px;
    max-height: 450px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-right: 6px;
  }

  #chat-log::-webkit-scrollbar { width: 3px; }
  #chat-log::-webkit-scrollbar-track { background: transparent; }
  #chat-log::-webkit-scrollbar-thumb { background: var(--blue-bright); }

  .msg {
    display: flex;
    gap: 12px;
    animation: msgIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-prefix {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-prefix { color: var(--blue-glow); }
  .msg.ai .msg-prefix { color: var(--cyan); }

  .msg-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--white);
  }

  .msg.user .msg-text { color: rgba(180, 220, 255, 0.9); }

  /* Thinking animation */
  .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }
  .thinking span {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--cyan);
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input row */
  .input-row {
    display: flex;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    resize: none;
    height: 52px;
    background: rgba(0,15,40,0.9);
    border: 1px solid rgba(0,102,255,0.25);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    padding: 14px;
    outline: none;
    line-height: 1.4;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #user-input:focus {
    border-color: rgba(0,238,255,0.5);
    box-shadow: 0 0 20px rgba(0,238,255,0.1);
  }

  #user-input::placeholder { color: rgba(0,102,255,0.35); }

  /* SEND BUTTON */
  #send-btn {
    background: #000000;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    padding: 0 24px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(0,238,255,0.2), inset 0 0 15px rgba(0,0,0,0.8);
  }

  #send-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(0,238,255,0.08) 100%);
  }

  #send-btn:hover {
    background: rgba(0,238,255,0.1);
    box-shadow: 0 0 30px rgba(0,238,255,0.4), inset 0 0 20px rgba(0,238,255,0.1);
    transform: translateY(-1px);
  }

  #send-btn:active { transform: translateY(0); }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Error */
  .error-msg {
    color: #ff4444;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 8px 12px;
    border: 1px solid rgba(255,68,68,0.3);
    background: rgba(255,0,0,0.05);
    display: none;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(0,80,160,0.5);
    padding-top: 10px;
  }

  /* Glow orb background */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 1;
  }
  .glow-orb.a {
    width: 400px; height: 400px;
    background: rgba(0,50,180,0.15);
    top: -100px; right: -100px;
  }
  .glow-orb.b {
    width: 300px; height: 300px;
    background: rgba(0,20,100,0.2);
    bottom: -50px; left: -50px;
  }

  /* Model selector */
  select {
    background: rgba(0,20,60,0.8);
    border: 1px solid rgba(0,102,255,0.3);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 8px 10px;
    outline: none;
    letter-spacing: 0.1em;
    cursor: pointer;
    width: 100%;
  }

  .controls-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .control-group { flex: 1; }
</style>
</head>
<body>

<div class="glow-orb a"></div>
<div class="glow-orb b"></div>

<div class="container">

  <div class="header">
    <div class="logo">GROQ::AI</div>
    <div class="tagline">Neural Interface // v2.4.1 // Secure Channel</div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot" id="conn-dot"></span><span id="conn-text">OFFLINE :: INSERIRE CHIAVE</span></span>
    <span id="time-display"></span>
    <span>SYS::OK</span>
  </div>

  <!-- API Key -->
  <div class="panel" data-label="// autenticazione">
    <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div><div class="panel-corner br"></div>
    <div class="label">GROQ API KEY</div>
    <div class="key-row">
      <input type="password" id="api-key" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      <button class="toggle-key" onclick="toggleKey()">MOSTRA</button>
      <button class="toggle-key" onclick="saveKey()" style="border-color:rgba(0,238,255,0.4);color:var(--cyan);">SALVA</button>
    </div>
    <div class="error-msg" id="key-error">⚠ CHIAVE NON VALIDA O ASSENTE</div>
  </div>

  <!-- Model + System -->
  <div class="panel" data-label="// configurazione">
    <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div><div class="panel-corner br"></div>
    <div class="controls-row">
      <div class="control-group">
        <div class="label">MODELLO</div>
        <select id="model-select">
          <option value="llama-3.3-70b-versatile">LLAMA 3.3 :: 70B</option>
          <option value="llama-3.1-8b-instant">LLAMA 3.1 :: 8B FAST</option>
          <option value="mixtral-8x7b-32768">MIXTRAL :: 8x7B</option>
          <option value="gemma2-9b-it">GEMMA 2 :: 9B</option>
        </select>
      </div>
      <div class="control-group">
        <div class="label">SYSTEM PROMPT</div>
        <input type="text" id="system-prompt" value="Sei un assistente AI futuristico. Rispondi in modo preciso e conciso." placeholder="Istruzioni al modello...">
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="panel" data-label="// canale di comunicazione" style="flex:1">
    <div class="panel-corner tl"></div><div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div><div class="panel-corner br"></div>

    <div id="chat-log">
      <div class="msg ai">
        <span class="msg-prefix">[GROQ]</span>
        <span class="msg-text">Sistema online. Inserisci la tua GROQ API KEY e inizia la comunicazione.</span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <textarea id="user-input" placeholder="// invia messaggio..."></textarea>
    <button id="send-btn" onclick="sendMessage()">INVIA</button>
  </div>

  <div class="footer">GROQ NEURAL INTERFACE // ENCRYPTED // © 2026</div>

</div>

<script>
  // Clock
  function updateTime() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('time-display').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} UTC`;
  }
  setInterval(updateTime, 1000);
  updateTime();

  // Load saved key
  const savedKey = localStorage.getItem('groq_key');
  if (savedKey) {
    document.getElementById('api-key').value = savedKey;
    setOnline(true);
  }

  function toggleKey() {
    const inp = document.getElementById('api-key');
    const btn = event.target;
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'NASCONDI'; }
    else { inp.type = 'password'; btn.textContent = 'MOSTRA'; }
  }

  function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (key) {
      localStorage.setItem('groq_key', key);
      setOnline(true);
      document.getElementById('key-error').style.display = 'none';
      addMsg('system', ':: CHIAVE SALVATA :: Connessione stabilita.');
    }
  }

  function setOnline(on) {
    const dot = document.getElementById('conn-dot');
    const txt = document.getElementById('conn-text');
    if (on) {
      dot.classList.add('active');
      txt.textContent = 'ONLINE :: CANALE SICURO ATTIVO';
    } else {
      dot.classList.remove('active');
      txt.textContent = 'OFFLINE :: INSERIRE CHIAVE';
    }
  }

  let messages = [];

  function addMsg(role, text) {
    const log = document.getElementById('chat-log');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
    const prefix = role === 'user' ? '[USR]' : role === 'system' ? '[SYS]' : '[GROQ]';
    div.innerHTML = `<span class="msg-prefix">${prefix}</span><span class="msg-text">${escHtml(text)}</span>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function showThinking() {
    const log = document.getElementById('chat-log');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'thinking';
    div.innerHTML = `<span class="msg-prefix">[GROQ]</span><div class="thinking"><span></span><span></span><span></span></div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    const key = document.getElementById('api-key').value.trim();
    const model = document.getElementById('model-select').value;
    const systemPrompt = document.getElementById('system-prompt').value.trim();
    const errDiv = document.getElementById('key-error');
    const btn = document.getElementById('send-btn');

    if (!text) return;

    if (!key) {
      errDiv.style.display = 'block';
      errDiv.textContent = '⚠ INSERIRE LA GROQ API KEY PER COMUNICARE';
      return;
    }

    errDiv.style.display = 'none';
    input.value = '';
    btn.disabled = true;

    messages.push({ role: 'user', content: text });
    addMsg('user', text);
    showThinking();

    try {
      const body = {
        model,
        messages,
        max_tokens: 1024,
        temperature: 0.7,
      };
      if (systemPrompt) body.messages = [{ role: 'system', content: systemPrompt }, ...messages];

      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify(body)
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `ERRORE HTTP ${res.status}`;
        addMsg('ai', `[ERRORE] ${msg}`);
        if (res.status === 401) {
          errDiv.style.display = 'block';
          errDiv.textContent = '⚠ CHIAVE NON VALIDA — Accesso negato';
          setOnline(false);
        }
        messages.pop();
      } else {
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '[Risposta vuota]';
        messages.push({ role: 'assistant', content: reply });
        addMsg('ai', reply);
        setOnline(true);
      }
    } catch(e) {
      removeThinking();
      addMsg('ai', `[ERRORE DI RETE] ${e.message}`);
      messages.pop();
    }

    btn.disabled = false;
    input.focus();
  }

  // Enter to send (Shift+Enter = newline)
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
