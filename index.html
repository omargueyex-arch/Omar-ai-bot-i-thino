<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Omar AI — Bot Personale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --panel: #0d0d12;
  --border: #1e1e2e;
  --accent: #7c3aed;
  --accent2: #06d6a0;
  --user-c: #a78bfa;
  --bot-c: #06d6a0;
  --text: #e2e8f0;
  --muted: #64748b;
  --glow: rgba(124,58,237,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Radial glow blobs */
body::after {
  content: '';
  position: fixed;
  top: -20vh; left: -10vw;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: blobDrift 12s ease-in-out infinite alternate;
}

@keyframes blobDrift {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(8vw, 6vh) scale(1.1); }
}

.blob2 {
  position: fixed;
  bottom: -15vh; right: -5vw;
  width: 50vw; height: 50vw;
  background: radial-gradient(circle, rgba(6,214,160,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: blobDrift2 15s ease-in-out infinite alternate;
}

@keyframes blobDrift2 {
  from { transform: translate(0, 0); }
  to { transform: translate(-6vw, -4vh) scale(1.08); }
}

/* Layout */
.shell {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 760px;
  margin: 0 auto;
  padding: 0;
}

/* Header */
header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(13,13,18,0.8);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}

.avatar {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(124,58,237,0.4);
  animation: avatarPulse 3s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.4); }
  50% { box-shadow: 0 0 30px rgba(124,58,237,0.7), 0 0 50px rgba(6,214,160,0.2); }
}

.header-info h1 {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: #fff;
}

.header-info p {
  font-size: 11px;
  color: var(--accent2);
  font-family: 'Space Mono', monospace;
  margin-top: 1px;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  margin-right: 2px;
  display: inline-block;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.model-badge {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  letter-spacing: 0.5px;
}

/* Chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Welcome screen */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  padding: 40px 20px;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-icon {
  font-size: 52px;
  animation: welcomeFloat 4s ease-in-out infinite;
}

@keyframes welcomeFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome h2 {
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--user-c), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.welcome p {
  color: var(--muted);
  font-size: 14px;
  max-width: 340px;
  line-height: 1.6;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
}

.chip {
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.25);
  color: var(--user-c);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Space Mono', monospace;
}

.chip:hover {
  background: rgba(124,58,237,0.2);
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* Messages */
.msg-wrap {
  display: flex;
  gap: 10px;
  animation: msgIn 0.3s ease both;
  max-width: 100%;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-wrap.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-top: 2px;
}

.msg-wrap.bot .msg-avatar {
  background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(6,214,160,0.3));
  border: 1px solid rgba(124,58,237,0.3);
}

.msg-wrap.user .msg-avatar {
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.2);
}

.msg-bubble {
  max-width: calc(100% - 50px);
}

.msg-text {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}

.msg-wrap.bot .msg-text {
  background: rgba(6,214,160,0.06);
  border: 1px solid rgba(6,214,160,0.12);
  color: #d1fae5;
  border-bottom-left-radius: 4px;
}

.msg-wrap.user .msg-text {
  background: rgba(124,58,237,0.12);
  border: 1px solid rgba(124,58,237,0.2);
  color: var(--user-c);
  border-bottom-right-radius: 4px;
  text-align: right;
}

.msg-time {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
  padding: 0 4px;
}

.msg-wrap.user .msg-time { text-align: right; }

/* Typing indicator */
.typing-wrap {
  display: flex;
  gap: 10px;
  animation: msgIn 0.3s ease both;
}

.typing-bubble {
  padding: 12px 16px;
  background: rgba(6,214,160,0.06);
  border: 1px solid rgba(6,214,160,0.12);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  animation: typingDot 1.2s ease-in-out infinite;
}

.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingDot {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Input area */
.input-area {
  padding: 14px 24px 18px;
  border-top: 1px solid var(--border);
  background: rgba(13,13,18,0.85);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-wrap {
  flex: 1;
  position: relative;
}

textarea {
  width: 100%;
  padding: 11px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  outline: none;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow-y: auto;
}

textarea:focus {
  border-color: rgba(124,58,237,0.5);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
}

textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #5b21b6);
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(124,58,237,0.3);
}

.send-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(124,58,237,0.5);
}

.send-btn:active { transform: scale(0.96); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.input-footer {
  margin-top: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  text-align: center;
}

/* Scrollbar for textarea */
textarea::-webkit-scrollbar { width: 4px; }
textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Markdown-ish rendering in bot messages */
.msg-text strong { color: #fff; font-weight: 700; }
.msg-text em { color: var(--accent2); }
.msg-text code {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 1px 5px;
}

/* Divider */
.day-sep {
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.day-sep::before, .day-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

@media (max-width: 520px) {
  #chat { padding: 14px 14px; }
  .input-area { padding: 10px 14px 14px; }
  header { padding: 14px 16px 12px; }
  .welcome h2 { font-size: 21px; }
}
</style>
</head>
<body>
<div class="blob2"></div>

<div class="shell">
  <!-- Header -->
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Omar AI</h1>
      <p><span class="status-dot"></span>online · Claude Sonnet</p>
    </div>
    <div class="model-badge">claude-sonnet-4</div>
  </header>

  <!-- Chat -->
  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>Ciao Omar!</h2>
      <p>Sono il tuo assistente AI personale. Posso aiutarti con domande, calcoli, compiti, codice e molto altro.</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('Cosa riesci a fare?')">Cosa sai fare?</div>
        <div class="chip" onclick="quickSend('Aiutami con un calcolo matematico')">Matematica</div>
        <div class="chip" onclick="quickSend('Dimmi una barzelletta italiana')">😂 Barzelletta</div>
        <div class="chip" onclick="quickSend('Come posso migliorare in Rocket League?')">🎮 Rocket League</div>
        <div class="chip" onclick="quickSend('Che ore sono e che giorno è oggi?')">🕐 Ora & Data</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="inputText"
          placeholder="Scrivi un messaggio..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Invia">
        ➤
      </button>
    </div>
    <div class="input-footer">Omar AI • Powered by Claude • Premi Enter per inviare</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Sei Omar AI, un assistente AI personale brillante e amichevole, creato da Omar.

PERSONALITÀ:
- Sei energico, diretto e un po' divertente
- Rispondi sempre in italiano, ma puoi capire e rispondere in altre lingue se l'utente scrive in un'altra lingua
- Sei esperto di matematica, coding, giochi (specialmente Rocket League), scuola e cultura generale
- Usi emoji con moderazione per rendere le risposte più vivaci
- Risposte brevi per domande semplici, dettagliate per domande complesse

CAPACITÀ:
- Calcoli matematici e algebra
- Aiuto con compiti scolastici
- Consigli su Rocket League e gaming
- Programmazione e tecnologia
- Cultura generale, storia, scienze
- Traduzioni multilingua (italiano, inglese, francese, spagnolo, wolof)
- Barzellette e intrattenimento
- Ora e data attuali

STILE:
- Vai dritto al punto
- Usa formattazione quando utile (elenchi, grassetto)
- Sii onesto se non sai qualcosa
- Non essere prolisso inutilmente

Ricorda: sei il bot personale di Omar, quindi trattalo come un amico fidato!`;

let conversationHistory = [];
let isLoading = false;

function getTime() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function formatBotText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMessage(role, text) {
  removeWelcome();
  const chat = document.getElementById('chat');

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  if (role === 'bot') {
    textEl.innerHTML = formatBotText(text);
  } else {
    textEl.textContent = text;
  }

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = getTime();

  bubble.appendChild(textEl);
  bubble.appendChild(timeEl);
  wrap.appendChild(avatarEl);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  removeWelcome();
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typingIndicator';

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.style.cssText = 'width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(6,214,160,0.3));border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;';
  avatarEl.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(avatarEl);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  if (!response.ok) {
    throw new Error(`API error: ${response.status}`);
  }

  const data = await response.json();
  const botText = data.content
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");

  conversationHistory.push({ role: "assistant", content: botText });

  // Keep history manageable (last 20 messages)
  if (conversationHistory.length > 20) {
    conversationHistory = conversationHistory.slice(-20);
  }

  return botText;
}

async function sendMessage() {
  const input = document.getElementById('inputText');
  const userText = input.value.trim();
  if (!userText || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  input.style.height = '44px';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', userText);
  showTyping();

  try {
    const botReply = await callClaude(userText);
    removeTyping();
    appendMessage('bot', botReply);
  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ Errore di connessione. Controlla la tua connessione e riprova.');
    console.error(err);
    // Remove failed message from history
    if (conversationHistory[conversationHistory.length - 1]?.role === 'user') {
      conversationHistory.pop();
    }
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('inputText').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Focus input on load
window.addEventListener('load', () => {
  document.getElementById('inputText').focus();
});
</script>
</body>
</html>
