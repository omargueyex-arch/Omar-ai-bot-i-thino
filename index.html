<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROQ.AI — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg2: #0a0f1e;
    --bg3: #0f1629;
    --accent: #00f5c4;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --border: rgba(0,245,196,0.15);
    --glow: 0 0 20px rgba(0,245,196,0.3);
    --glow2: 0 0 30px rgba(124,58,237,0.4);
    --error: #ef4444;
    --code-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ANIMATED GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* FLOATING PARTICLES */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }
  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* MAIN LAYOUT */
  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* KEY ENTRY SCREEN */
  #keyScreen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }

  .key-container {
    width: 480px;
    max-width: 90vw;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(40px);
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    position: relative;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px var(--accent));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 15px var(--accent)); }
    50% { filter: drop-shadow(0 0 35px var(--accent)) drop-shadow(0 0 60px rgba(0,245,196,0.3)); }
  }

  .logo-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.5rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, #00b4d8 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .key-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 0 60px rgba(0,245,196,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .key-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .key-input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .key-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 50px 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }

  .key-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,245,196,0.1);
  }

  .key-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .key-toggle:hover { color: var(--accent); }

  .key-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00b4d8);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .key-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .key-btn:hover::before { opacity: 1; }
  .key-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,245,196,0.4); }
  .key-btn:active { transform: translateY(0); }

  .key-note {
    margin-top: 14px;
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
  }

  .key-note a {
    color: var(--accent);
    text-decoration: none;
  }

  .key-saved {
    display: none;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: rgba(0,245,196,0.07);
    border: 1px solid rgba(0,245,196,0.25);
    border-radius: 8px;
    font-size: 0.68rem;
    color: var(--accent);
    text-align: center;
  }

  .key-error {
    color: var(--error);
    font-size: 0.7rem;
    margin-top: 8px;
    display: none;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* HEADER */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(10,15,30,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    background: linear-gradient(135deg, var(--accent), #00b4d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* MODEL SELECTOR */
  .model-select-wrap {
    position: relative;
  }

  .model-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 32px 7px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text);
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    transition: all 0.2s;
  }
  .model-select:focus, .model-select:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,245,196,0.1);
  }
  .model-select option { background: var(--bg2); }

  .model-arrow {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--accent);
    font-size: 0.6rem;
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 7px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-btn.active {
    background: linear-gradient(135deg, rgba(0,245,196,0.2), rgba(0,180,216,0.2));
    color: var(--accent);
    box-shadow: inset 0 0 10px rgba(0,245,196,0.1);
  }

  /* STATUS DOT */
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .api-badge {
    font-size: 0.6rem;
    color: var(--text-dim);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .api-badge:hover { border-color: var(--accent); color: var(--accent); }

  /* CHAT AREA */
  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chatArea::-webkit-scrollbar { width: 4px; }
  #chatArea::-webkit-scrollbar-track { background: transparent; }
  #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* WELCOME */
  .welcome-msg {
    text-align: center;
    padding: 48px 0;
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 600px;
    margin: 32px auto 0;
  }

  .welcome-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 0.65rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.5;
  }

  .welcome-chip:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(0,245,196,0.05);
    transform: translateY(-2px);
  }

  .welcome-chip-icon {
    font-size: 1.2rem;
    margin-bottom: 6px;
    display: block;
  }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 14px;
    animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 700;
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), #9333ea);
    box-shadow: 0 0 15px rgba(124,58,237,0.4);
  }

  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--bg3), var(--bg2));
    border: 1px solid var(--border);
    box-shadow: var(--glow);
  }

  .msg-bubble {
    max-width: 70%;
    min-width: 60px;
  }

  .msg.user .msg-bubble { align-items: flex-end; display: flex; flex-direction: column; }

  .msg-content {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.82rem;
    line-height: 1.7;
    position: relative;
    word-break: break-word;
  }

  .msg.user .msg-content {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(147,51,234,0.15));
    border-color: rgba(124,58,237,0.3);
  }

  .msg.ai .msg-content {
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  /* CODE BLOCKS */
  .msg-content pre {
    background: var(--code-bg);
    border: 1px solid rgba(0,245,196,0.15);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }

  .msg-content pre::before {
    content: attr(data-lang);
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .msg-content code {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #e2e8f0;
  }

  .msg-content p:not(:last-child) { margin-bottom: 8px; }

  .msg-content strong { color: var(--accent); }

  .msg-meta {
    font-size: 0.6rem;
    color: var(--text-dim);
    margin-top: 5px;
    padding: 0 4px;
  }

  /* TYPING INDICATOR */
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* INPUT AREA */
  #inputArea {
    padding: 16px 24px 20px;
    background: rgba(10,15,30,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* CODE MODE TOOLBAR */
  #codeToolbar {
    display: none;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px;
  }

  #codeToolbar.visible { display: flex; }

  .code-lang-select {
    background: transparent;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent3);
    outline: none;
    cursor: pointer;
  }
  .code-lang-select option { background: var(--bg2); color: var(--text); }

  .code-toolbar-label {
    font-size: 0.6rem;
    color: var(--accent3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .code-toolbar-sep {
    width: 1px;
    height: 16px;
    background: rgba(245,158,11,0.2);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: all 0.3s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,245,196,0.08);
  }

  .input-wrap.code-mode {
    border-color: rgba(245,158,11,0.4);
    box-shadow: 0 0 0 3px rgba(245,158,11,0.06);
  }

  #msgInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    resize: none;
    max-height: 160px;
    min-height: 24px;
    line-height: 1.6;
  }

  #msgInput::placeholder { color: var(--text-dim); }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* MIC BUTTON */
  #micBtn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  #micBtn:hover { border-color: var(--accent2); color: var(--accent2); }

  #micBtn.listening {
    background: rgba(239,68,68,0.15);
    border-color: #ef4444;
    color: #ef4444;
    animation: micPulse 1.5s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }

  /* SEND BUTTON */
  #sendBtn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #00b4d8);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,245,196,0.5); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .input-hint span { display: flex; align-items: center; gap: 4px; }

  kbd {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
  }

  /* VOICE STATUS BAR */
  #voiceBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 0.7rem;
    color: #ef4444;
  }

  #voiceBar.visible { display: flex; }

  .voice-wave {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .voice-bar-item {
    width: 3px;
    background: #ef4444;
    border-radius: 2px;
    animation: voiceWave 0.5s ease-in-out infinite alternate;
  }
  .voice-bar-item:nth-child(1) { height: 8px; animation-delay: 0s; }
  .voice-bar-item:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .voice-bar-item:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .voice-bar-item:nth-child(4) { height: 20px; animation-delay: 0.05s; }
  .voice-bar-item:nth-child(5) { height: 6px; animation-delay: 0.15s; }

  @keyframes voiceWave {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1.2); }
  }

  /* SCAN LINE EFFECT */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanLine 6s linear infinite;
    opacity: 0.4;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes scanLine {
    0% { top: 0; }
    100% { top: 100vh; }
  }

  /* NOTIFICATION */
  .notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.72rem;
    z-index: 200;
    animation: notifIn 0.3s ease forwards;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes notifIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .notification.success { border-color: rgba(0,245,196,0.4); color: var(--accent); }
  .notification.error { border-color: rgba(239,68,68,0.4); color: var(--error); }

  /* COPY BUTTON */
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 30px;
    background: rgba(0,245,196,0.1);
    border: 1px solid rgba(0,245,196,0.2);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 0.6rem;
    color: var(--accent);
    cursor: pointer;
